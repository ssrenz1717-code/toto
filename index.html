<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TonerTrack · สต็อกหมึกพิมพ์ IT</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
*::-webkit-scrollbar{width:5px;height:5px}
*::-webkit-scrollbar-track{background:var(--surface3)}
*::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
body{font-family:'Sarabun',sans-serif;background:var(--bg-main);color:var(--text-primary);-webkit-font-smoothing:antialiased}
body.modal-open{overflow:hidden}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;transition:box-shadow .2s,transform .2s}
.card-hover:hover{box-shadow:0 8px 30px rgba(0,0,0,.1);transform:translateY(-2px)}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:12px}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text-muted);border:1px solid transparent}
.sidebar-item:hover{background:var(--surface3);color:var(--text-primary)}
.sidebar-item.active{background:#ede9fe;color:#4f46e5;border-color:#c4b5fd}
.tab{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);transition:all .15s;color:var(--text-muted);background:var(--surface)}
.tab:hover{background:var(--surface2);border-color:var(--text-placeholder);color:var(--text-primary)}
.tab.t-all{background:#4f46e5;color:#fff;border-color:#4f46e5}
.tab.t-normal{background:#dcfce7;color:#16a34a;border-color:#86efac}
.tab.t-low{background:#fef3c7;color:#d97706;border-color:#fcd34d}
.tab.t-critical{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.tab.t-empty{background:var(--surface3);color:var(--text-muted);border-color:var(--text-placeholder)}
.btn-add{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;background:#dcfce7;border:1px solid #86efac;color:#16a34a;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Sarabun',sans-serif}
.btn-add:hover{background:#bbf7d0;transform:scale(1.03)}
.btn-add:active{transform:scale(.97)}
.btn-add:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-use{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Sarabun',sans-serif}
.btn-use:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.btn-use:active{transform:scale(.97)}
.btn-use:disabled{opacity:.3;cursor:not-allowed;transform:none}
.progress-track{width:100%;height:8px;background:var(--border2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
input,textarea,select{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);padding:9px 12px;font-size:14px;outline:none;width:100%;box-sizing:border-box;font-family:'Sarabun',sans-serif;transition:border .15s,background .15s}
input::placeholder,textarea::placeholder{color:var(--text-placeholder)}
input:focus,textarea:focus,select:focus{border-color:#6366f1;background:var(--surface);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
input[type=number]{font-family:'JetBrains Mono',monospace}
select option{background:var(--surface);color:var(--text-primary)}
table{width:100%;border-collapse:collapse}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border2);white-space:nowrap}
td{padding:12px 16px;font-size:13px;color:var(--text-secondary);border-bottom:1px solid var(--border2)}
tr:hover td{background:var(--surface2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse-r{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .3s ease-out both}
.pulse-r{animation:pulse-r 1.8s ease-in-out infinite}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.35);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.notif-overlay{position:fixed;inset:0;z-index:40}
.notif-panel{position:fixed;right:0;top:0;bottom:0;width:340px;z-index:41;animation:slideIn .2s ease-out;background:var(--surface);border-left:1px solid var(--border);box-shadow:-8px 0 40px rgba(0,0,0,.08);display:flex;flex-direction:column}
.icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;background:none;border:none;cursor:pointer;color:var(--text-faint);transition:all .15s}
.icon-btn:hover{background:var(--surface3);color:#4f46e5}
.icon-btn:focus-visible,button:focus-visible{outline:2px solid #6366f1;outline-offset:2px}
:root{
  --bg-main:#f0f4f8;
  --surface:#ffffff;
  --surface2:#f8fafc;
  --surface3:#f1f5f9;

  --sc-low-c:#d97706;--sc-low-bg:#fef3c7;--sc-low-br:#fcd34d;--sc-low-text:#b45309;
  --sc-crit-c:#dc2626;--sc-crit-bg:#fee2e2;--sc-crit-br:#fca5a5;--sc-crit-text:#b91c1c;
  --sc-out-c:#64748b;--sc-out-bg:#f1f5f9;--sc-out-br:#cbd5e1;--sc-out-text:#475569;
  --nic-crit-c:#dc2626;--nic-crit-bg:#fee2e2;--nic-crit-br:#fca5a5;
  --nic-warn-c:#d97706;--nic-warn-bg:#fef3c7;--nic-warn-br:#fcd34d;
  --nic-info-c:#2563eb;--nic-info-bg:#dbeafe;--nic-info-br:#93c5fd;
  --ctc-inc-c:#16a34a;--ctc-inc-bg:#dcfce7;--ctc-dec-c:#dc2626;--ctc-dec-bg:#fee2e2;
  --ctc-set-c:#2563eb;--ctc-set-bg:#dbeafe;--ctc-rst-c:#0891b2;--ctc-rst-bg:#cffafe;
  --ctc-adj-c:#7c3aed;--ctc-adj-bg:#ede9fe;
}
body.dark{
  --bg-main:#0f172a;

  --ctc-inc-c:#4ade80;--ctc-inc-bg:rgba(21,128,61,.2);--ctc-dec-c:#f87171;--ctc-dec-bg:rgba(185,28,28,.2);

body.dark .sidebar-item.active{background:#1e1b4b;color:#a5b4fc;border-color:#4f46e5}

body.compact th{padding:8px 10px;font-size:10px}

@media(max-width:768px){.notif-panel{width:100vw!important}}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
@media(max-width:768px){
  .kpi-grid{display:flex;flex-wrap:nowrap;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:8px;gap:12px;-webkit-overflow-scrolling:touch}

.card-hover{transition:box-shadow .15s,transform .1s}

const CACHE_KEY='toner-data-v1';
const CACHE_TTL=10*60*1000;
function saveCache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),inventory:S.inventory,history:S.history,notifications:S.notifications,users:S.users,auditLogs:S.auditLogs}));}catch(e){}}
function loadCache(){
  try{
    const raw=localStorage.getItem(CACHE_KEY);
    if(!raw)return false;
    const c=JSON.parse(raw);
    if(Date.now()-c.ts>CACHE_TTL)return false;
    S.inventory=c.inventory||[];S.history=c.history||[];
    S.notifications=c.notifications||[];S.users=c.users||[];S.auditLogs=c.auditLogs||[];
    return true;
  }catch(e){return false;}
}
async function loadFromSupabase(){
  const ctrl=new AbortController();
  const abortTimer=setTimeout(()=>ctrl.abort(),42000);
  const[invR,histR,notifR,usersR,auditR]=await Promise.all([
    sb.from('inventory').select('*').order('mk').order('part').abortSignal(ctrl.signal),
    sb.from('history').select('*').order('date',{ascending:false}).limit(500).abortSignal(ctrl.signal),
    sb.from('notifications').select('*').order('date',{ascending:false}).limit(100).abortSignal(ctrl.signal),
    sb.from('users').select('*').order('created_at').abortSignal(ctrl.signal),
    sb.from('audit_logs').select('*').order('timestamp',{ascending:false}).limit(200).abortSignal(ctrl.signal),
  ]).finally(()=>clearTimeout(abortTimer));
  if(invR.error)throw new Error('inventory: '+invR.error.message);
  if(usersR.error)throw new Error('users: '+usersR.error.message);
  S.inventory=(invR.data||[]).map(mapInvFromDB);
  S.history=(histR.data||[]).map(mapHistFromDB);
  S.notifications=(notifR.data||[]).map(mapNotifFromDB);
  S.users=(usersR.data||[]).map(mapUserFromDB);
  S.auditLogs=(auditR.data||[]).map(mapAuditFromDB);
}
async function seedIfEmpty(){
  const now=new Date().toISOString();
  if(S.users.length===0){
    const{data,error}=await sb.from('users').insert(USERS.map(u=>mapUserToDB({...u,createdAt:now}))).select();
    if(!error&&data)S.users=data.map(mapUserFromDB);
  }
  if(S.inventory.length===0){
    const{data,error}=await sb.from('inventory').insert(DEF_INV.map(i=>mapInvToDB(i))).select();
    if(!error&&data){
      S.inventory=data.map(mapInvFromDB);
      await sb.from('history').insert(DEF_HIST.map(h=>mapHistToDB(h)));
      const{data:hd}=await sb.from('history').select('*').order('date',{ascending:false}).limit(500);
      if(hd)S.history=hd.map(mapHistFromDB);
      await sb.from('notifications').insert(defNotifs().map(n=>mapNotifToDB(n)));
      const{data:nd}=await sb.from('notifications').select('*').order('date',{ascending:false}).limit(100);
      if(nd)S.notifications=nd.map(mapNotifFromDB);
    }
  }
}
function initRealtime(){
  sb.channel('toner-realtime')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'inventory'},function(payload){
      const updated=mapInvFromDB(payload.new);
      const idx=S.inventory.findIndex(function(i){return i.id===updated.id;});
      if(idx!==-1){S.inventory[idx]=updated;renderContent();}
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'history'},function(payload){
      const entry=mapHistFromDB(payload.new);
      if(!S.history.find(function(h){return h.id===entry.id;})){S.history.unshift(entry);}
    })
    .subscribe();
}

function changeQty(id,delta){
  if(!canEditInventory())return;
  const item=S.inventory.find(i=>i.id===id);if(!item)return;
  const newQty=Math.max(0,item.qty+delta);
  if(Math.abs(delta)>=3||newQty===0){openReasonPrompt(id,delta);return;}
  applyQtyChange(id,newQty,delta>0?'เพิ่มด้วยตนเอง':'ลดด้วยตนเอง',delta>=0?'INCREASE':'DECREASE');
}
function applyQtyChange(id,newQty,reason,ct){
  if(!canEditInventory())return;
  const item=S.inventory.find(i=>i.id===id);if(!item)return;
  const prev=status(item);const oq=item.qty;
  item.qty=Math.max(0,newQty);item.updatedAt=new Date().toISOString();
  const h={id:uid(),iid:id,name:item.name,mk:item.mk,color:item.color,oq,nq:item.qty,ct:ct||'SET',reason,user:S.user?.fullName||'System',date:new Date().toISOString()};
  S.history.unshift(h);
  const nst=status(item);
  let newNotif=null;
  if(nst!==prev){
    const nt=nst==='OUT_OF_STOCK'||nst==='CRITICAL'?'CRITICAL':'WARNING';
    newNotif={id:uid(),type:nt,read:false,date:new Date().toISOString(),title:SC[nst].label+' — '+item.name+' ('+item.mk+')',msg:item.name+' ('+item.mk+') อยู่ที่ '+item.qty+' กล่อง'};
    S.notifications.unshift(newNotif);
  }
  sb.from('inventory').upsert(mapInvToDB(item)).then(function(r){if(r.error)showToast('บันทึกไม่สำเร็จ: '+r.error.message,'error');});
  sb.from('history').insert(mapHistToDB(h)).then(function(r){if(r.error)showToast('ประวัติ: '+r.error.message,'error');});
  if(newNotif){
    sb.from('notifications').insert(mapNotifToDB(newNotif));
    if(nst!=='NORMAL')sendTeamsAlert(newNotif.title,newNotif.msg,nst,MS_TEAMS_WEBHOOKS[item.mk]||'');
  }
  const card=document.querySelector(`[data-card="${id}"]`);
  if(card){const ctx=card.dataset?.context||'inventory';card.outerHTML=renderCard(item,S.inventory.indexOf(item),ctx);}
  const nb=document.getElementById('notif-badge');
  if(nb){nb.textContent=unread()||'';nb.style.display=unread()?'flex':'none';}
}

// ─── SCANNER (Physical Barcode Scanner / Keyboard Wedge) ────────
function togglePhysicalScanMode(){
  physicalScanMode=physicalScanMode==='OUT'?'IN':'OUT';
  const btn=document.getElementById('scan-mode-toggle');
  if(btn){
    if(physicalScanMode==='OUT'){
      btn.textContent='📤 โหมด: เบิกออก';
      btn.style.background='#fee2e2';btn.style.color='#dc2626';btn.style.borderColor='#fca5a5';
    } else {
      btn.textContent='📥 โหมด: รับเข้า';
      btn.style.background='#dcfce7';btn.style.color='#16a34a';btn.style.borderColor='#86efac';
    }
  }
}
function onScanSuccess(decodedText){
  const code=decodedText.trim();
  if(!code)return;
  if(_scanCooldown)return;
  const norm=function(s){return(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');};
  const nc=norm(code);
  const item=S.inventory.find(function(i){
    if(i.id===code)return true;
    const nb=norm(i.barcode);const np=norm(i.part);
    return(nb&&(nb===nc||nc.includes(nb)||nb.includes(nc)))||(np&&(np===nc||nc.includes(np)||np.includes(nc)));
  });
  if(!item){showToast('ไม่พบ: "'+code+'" — ตรวจสอบรหัสบาร์โค้ด','error');return;}
  if(physicalScanMode==='OUT'&&item.qty===0){showToast('หมึกหมดแล้ว ไม่สามารถเบิกได้','error');return;}
  _scanCooldown=true;
  const newQty=physicalScanMode==='OUT'?item.qty-1:item.qty+1;
  const actionType=physicalScanMode==='OUT'?'DECREASE':'INCREASE';
  const reason=physicalScanMode==='OUT'?'สแกนออก (ใช้หมึก)':'สแกนเข้า (เติมสต็อก)';
  applyQtyChange(item.id,newQty,reason,actionType);
  const verb=physicalScanMode==='OUT'?'เบิกออก':'รับเข้า';
  showToast(verb+' '+item.name+' ('+item.mk+') เหลือ '+newQty+' กล่อง','ok');
  setTimeout(function(){_scanCooldown=false;},2000);
}
// Global physical barcode scanner listener (keyboard wedge)
(function(){
  var buf='';
  var lastKey=0;
  var clearTimer=null;
  var SPEED_THRESHOLD=50; // ms — faster than this = scanner, slower = human
  var MIN_LEN=3;          // minimum barcode length to act on
  document.addEventListener('keydown',function(e){
    // Skip if focus is in a text field
    var tag=(document.activeElement||{}).tagName||'';
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
    var now=Date.now();
    var delta=now-lastKey;
    lastKey=now;
    if(e.key==='Enter'){
      var code=buf;
      buf='';
      if(clearTimer){clearTimeout(clearTimer);clearTimer=null;}
      if(code.length>=MIN_LEN&&delta<SPEED_THRESHOLD*4){
        if(!canEditInventory()){showToast('ต้องใช้สิทธิ์ Staff หรือ Admin เพื่อสแกน','error');return;}
        onScanSuccess(code);
      }
      return;
    }
    if(e.key.length===1){
      // Only accumulate if keystrokes are scanner-speed (or first char)
      if(buf.length===0||delta<SPEED_THRESHOLD){
        buf+=e.key;
      } else {
        // Human-speed keystroke — reset buffer
        buf=e.key;
      }
      if(clearTimer)clearTimeout(clearTimer);
      clearTimer=setTimeout(function(){buf='';clearTimer=null;},300);
    }
  });
}());

async function confirmAddItem(){
  if(!isAdmin())return;
  const g=function(id){return document.getElementById(id)?.value?.trim()||'';};
  const name=g('ai-name');
  const model=g('ai-model');
  const mk=g('ai-mk');
  const showErr=function(msg){const el=document.getElementById('ai-err');if(el){el.textContent=msg;el.style.display='block';el.scrollIntoView({behavior:'smooth',block:'nearest'});}};
  if(!name){showErr('กรุณาระบุชื่อหมึก');return;}
  if(!model){showErr('กรุณาระบุชื่อเครื่องพิมพ์ (พิมพ์หรือเลือกจากรายการ)');return;}
  if(!mk){showErr('กรุณาระบุรุ่นสั้น (เช่น 330AC, 4518A)');return;}
  const qty=parseInt(g('ai-qty'))||0,mn=parseInt(g('ai-min'))||3,crit=parseInt(g('ai-crit'))||1,mx=parseInt(g('ai-max'))||10;
  if(crit>=mn){showErr('วิกฤต ('+crit+') ต้องน้อยกว่าขั้นต่ำ ('+mn+')');return;}
  if(mn>=mx){showErr('ขั้นต่ำ ('+mn+') ต้องน้อยกว่าสูงสุด ('+mx+')');return;}
  const saveBtn=document.querySelector('[onclick="confirmAddItem()"]');
  if(saveBtn){saveBtn.textContent='กำลังบันทึก…';saveBtn.disabled=true;}
  const nu={id:uid(),name,model,mk,color:g('ai-color')||'BLACK',type:g('ai-type')||'TONER',part:g('ai-part'),qty,min:mn,critical:crit,max:mx,loc:g('ai-loc'),sup:g('ai-sup'),remarks:'',updatedAt:new Date().toISOString()};
  const{error}=await sb.from('inventory').insert(mapInvToDB(nu));
  if(error){
    showErr('บันทึกไม่สำเร็จ: '+error.message);
    if(saveBtn){saveBtn.textContent='+ เพิ่มรายการ';saveBtn.disabled=false;}
    return;
  }
  S.inventory.push(nu);
  closeModal();
  renderContent();
  showToast('เพิ่ม "'+nu.name+'" ('+nu.mk+') เรียบร้อยแล้ว','ok');
}

function renderLogin(){
  const isReg=S.mode==='register';
  const d=S.regDraft||{u:'',fn:'',em:'',p:'',p2:''};

  // Load remembered credentials
  const remembered=JSON.parse(localStorage.getItem('toner-remember')||'null');
  const remUser=remembered?.username||'';
  const remPass=remembered?.password||'';
  const remChecked=!!remembered;

  const errHtml=isReg&&S.regErr?'<div style="font-size:13px;color:#dc2626;background:rgba(254,226,226,.9);border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;font-weight:500">'+S.regErr+'</div>':'';
  const okHtml=!isReg&&S.regOk?'<div style="font-size:13px;color:#16a34a;background:rgba(220,252,231,.9);border:1px solid #86efac;border-radius:10px;padding:10px 14px;font-weight:500">'+S.regOk+'</div>':'';
  const loginErrHtml=!isReg&&S.loginErr?'<div style="font-size:13px;color:#dc2626;background:rgba(254,226,226,.9);border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;font-weight:500">'+S.loginErr+'</div>':'';
  const eyeStyle='position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-faint);display:flex;padding:0';
  const eyeBtn='<button id="eye-lp" onclick="togglePassVis(\'lp\',\'eye-lp\',\'showPass\')" style="'+eyeStyle+'">'+(S.showPass?I.eyeoff:I.eye)+'</button>';
  const eyeBtn2='<button id="eye-rp" onclick="togglePassVis(\'rp\',\'eye-rp\',\'showPass\')" style="'+eyeStyle+'">'+(S.showPass?I.eyeoff:I.eye)+'</button>';
  const eyeBtn3='<button id="eye-rp2" onclick="togglePassVis(\'rp2\',\'eye-rp2\',\'showPass2\')" style="'+eyeStyle+'">'+(S.showPass2?I.eyeoff:I.eye)+'</button>';

  let formHtml;
  if(isReg){
    formHtml='<div style="display:flex;flex-direction:column;gap:12px">'
      +'<div><label style="display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:5px">ชื่อผู้ใช้ <span style="color:#ef4444">*</span></label>'
      +'<input id="ru" type="text" value="'+esc(d.u)+'" placeholder="ตัวอักษรภาษาอังกฤษ ตัวเลข" autocomplete="username" oninput="S.regDraft.u=this.value" onkeydown="if(event.key===\'Enter\')document.getElementById(\'rn\').focus()"/></div>'
      +'<div><label style="display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:5px">ชื่อ-นามสกุล <span style="color:#ef4444">*</span></label>'
      +'<input id="rn" type="text" value="'+esc(d.fn)+'" placeholder="ชื่อที่แสดงในระบบ" oninput="S.regDraft.fn=this.value" onkeydown="if(event.key===\'Enter\')document.getElementById(\'re\').focus()"/></div>'
      +'<div><label style="display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:5px">อีเมล <span style="color:#ef4444">*</span></label>'
      +'<input id="re" type="email" value="'+esc(d.em)+'" placeholder="example@company.com" oninput="S.regDraft.em=this.value" onkeydown="if(event.key===\'Enter\')document.getElementById(\'rp\').focus()"/></div>'
      +'<div><label style="display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:5px">รหัสผ่าน <span style="color:#ef4444">*</span></label>'
      +'<div style="position:relative"><input id="rp" type="'+(S.showPass?'text':'password')+'" value="'+esc(d.p)+'" placeholder="อย่างน้อย 6 ตัวอักษร" style="padding-right:40px" oninput="S.regDraft.p=this.value" onkeydown="if(event.key===\'Enter\')document.getElementById(\'rp2\').focus()"/>'+eyeBtn2+'</div></div>'
      +'<div><label style="display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:5px">ยืนยันรหัสผ่าน <span style="color:#ef4444">*</span></label>'
      +'<div style="position:relative"><input id="rp2" type="'+(S.showPass2?'text':'password')+'" value="'+esc(d.p2)+'" placeholder="กรอกรหัสผ่านอีกครั้ง" style="padding-right:40px" oninput="S.regDraft.p2=this.value" onkeydown="if(event.key===\'Enter\')doRegister()"/>'+eyeBtn3+'</div></div>'
      +errHtml
      +'<button onclick="doRegister()" style="width:100%;padding:12px;border-radius:12px;background:#4f46e5;color:#fff;font-size:15px;font-weight:700;cursor:pointer;border:none;margin-top:2px;box-shadow:0 4px 12px rgba(79,70,229,.3);font-family:\'Sarabun\',sans-serif" onmouseover="this.style.background=\'#4338ca\'" onmouseout="this.style.background=\'#4f46e5\'">สมัครสมาชิก</button>'
      +'<div style="font-size:12px;color:var(--text-faint);background:var(--surface2);border-radius:8px;padding:8px 12px">บัญชีใหม่จะเป็นผู้ชมก่อน หากต้องการแก้สต็อกให้ Admin ปรับสิทธิ์ให้</div>'
      +'</div>';
  } else {
    formHtml='<div style="display:flex;flex-direction:column;gap:14px">'

function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  const rememberMe=document.getElementById('remember-me')?.checked;
  const user=S.users.find(x=>x.username===u&&x.password===p);
  if(!user){S.loginErr='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';S.mode='login';renderLogin();return;}
  // Save or clear remembered credentials
  if(rememberMe)localStorage.setItem('toner-remember',JSON.stringify({username:u,password:p}));
  else localStorage.removeItem('toner-remember');
  user.lastLogin=new Date().toISOString();
  sb.from('users').update({last_login:user.lastLogin}).eq('id',user.id);
  const log={id:uid(),username:user.username,fullName:user.fullName,role:user.role,timestamp:new Date().toISOString()};
  S.auditLogs.unshift(log);
  if(S.auditLogs.length>200)S.auditLogs=S.auditLogs.slice(0,200);
  sb.from('audit_logs').insert(mapAuditToDB(log));
  S.user=user;S.page='dashboard';S.loginErr='';S.regOk='';
  saveSession();render();
}

// ─── GROUPED CARDS ────────────────────────────────────────────
function renderGroupedCards(items,context){
  context=context||'inventory';
  if(!items.length)return`<div style="text-align:center;padding:60px;color:var(--text-faint)">
    <div style="font-size:36px;margin-bottom:12px">📦</div>
    <div style="font-size:14px;font-weight:500">ไม่พบรายการที่ตรงกับตัวกรอง</div>
  </div>`;
  const order=['Toshiba e-STUDIO 330AC (เครื่องเล็ก)','Toshiba e-STUDIO 2521AC (เครื่องใหญ่)'];
  const grouped={};
  items.forEach(i=>{if(!grouped[i.model])grouped[i.model]=[];grouped[i.model].push(i);});
  const modelColors={'330AC':'#0891b2','2521AC':'#7c3aed'};
  return order.filter(m=>grouped[m]).map(model=>{
    const mk=grouped[model][0].mk;
    const mc=modelColors[mk]||'#4f46e5';
    const mItems=grouped[model];
    const eModel=esc(model);
    const mSt=mItems.reduce((a,i)=>{const s=status(i);if(s==='OUT_OF_STOCK')a.out++;else if(s==='CRITICAL')a.crit++;else if(s==='LOW')a.low++;else a.ok++;return a;},{ok:0,low:0,crit:0,out:0});
    return`<div style="margin-bottom:28px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border2)">
        <div style="width:6px;height:24px;border-radius:99px;background:${mc};flex-shrink:0"></div>
        <div>
          <div style="font-size:16px;font-weight:700;color:var(--text-primary)">${eModel}</div>
          <div style="font-size:12px;color:var(--text-faint);margin-top:2px">
            ${mItems.length} รายการ
            ${mSt.out?` · <span style="color:var(--text-muted);font-weight:600">${mSt.out} หมดแล้ว</span>`:''}
            ${mSt.crit?` · <span style="color:#dc2626;font-weight:600">${mSt.crit} วิกฤต</span>`:''}
            ${mSt.low?` · <span style="color:#d97706;font-weight:600">${mSt.low} ใกล้หมด</span>`:''}
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:12px">
        ${mItems.map((item,idx)=>renderCard(item,idx,context)).join('')}
      </div>
    </div>`;
  }).join('');
}

// ─── FILTER BAR ───────────────────────────────────────────────
function renderFilters(items){
  const count=f=>f==='ALL'?items.length:items.filter(i=>status(i)===f).length;
  const tabs=[['ALL','ทั้งหมด'],['NORMAL','ปกติ'],['LOW','ใกล้หมด'],['CRITICAL','วิกฤต'],['OUT_OF_STOCK','หมดแล้ว']];
  return`<div style="display:flex;gap:6px;flex-wrap:wrap">
  ${tabs.map(([f,lb])=>{const active=S.filter===f;const cls=active?(f==='ALL'?'t-all':f==='NORMAL'?'t-normal':f==='LOW'?'t-low':f==='CRITICAL'?'t-critical':'t-empty'):'';
  return`<button class="tab ${cls}" onclick="setFilter('${f}')">${lb} <span style="font-size:11px;opacity:.65">(${count(f)})</span></button>`}).join('')}

}

        +roleCell
        +'<td style="color:var(--text-faint);font-size:12px;white-space:nowrap">'+(u.createdAt?fmtDt(u.createdAt):'—')+'</td>'
        +'<td style="color:var(--text-faint);font-size:12px;white-space:nowrap">'+(u.lastLogin?fmtDt(u.lastLogin):'ยังไม่เคย')+'</td>'
        +delCell+'</tr>';
    });
    if(!rows)rows='<tr><td colspan="8" style="text-align:center;color:var(--text-faint);padding:30px">ไม่มีข้อมูลผู้ใช้</td></tr>';
    bodyHtml='<div style="overflow-x:auto"><table><thead><tr><th>ชื่อ-นามสกุล</th><th>ชื่อผู้ใช้</th><th>อีเมล</th><th>รหัสผ่าน</th><th>สิทธิ์</th><th>สมัครเมื่อ</th><th>เข้าสู่ล่าสุด</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  } else {
    let rows='';
    S.auditLogs.forEach(function(log){
      const roleColor=log.role==='ADMIN'?'#4f46e5':log.role==='STAFF'?'#0891b2':'#64748b';
      const roleBg=log.role==='ADMIN'?'#ede9fe':log.role==='STAFF'?'#cffafe':'#f1f5f9';
      rows+='<tr>'
        +'<td class="mono" style="font-size:12px;color:var(--text-faint);white-space:nowrap">'+fmtDt(log.timestamp)+'</td>'
        +'<td style="font-weight:600;color:var(--text-primary)">'+esc(log.fullName)+'</td>'
        +'<td style="font-family:\'JetBrains Mono\',monospace;font-size:12px">'+esc(log.username)+'</td>'
        +'<td><span style="font-size:11px;padding:3px 10px;border-radius:6px;background:'+roleBg+';color:'+roleColor+';font-weight:700">'+esc(log.role)+'</span></td>'
        +'</tr>';
    });
    if(!rows)rows='<tr><td colspan="4" style="text-align:center;color:var(--text-faint);padding:30px">ยังไม่มีประวัติการเข้าสู่ระบบ</td></tr>';
    bodyHtml='<div style="overflow-x:auto"><table><thead><tr><th>เวลา</th><th>ชื่อ-นามสกุล</th><th>ชื่อผู้ใช้</th><th>สิทธิ์</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }
  document.getElementById('content').innerHTML='<div style="padding:18px;max-width:1000px">'
    +'<div class="card fade-up" style="overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border2);flex-wrap:wrap;gap:10px">'
    +'<div style="display:flex;gap:6px">'
    +'<button class="tab'+(isAccounts?' t-all':'')+'" onclick="setUsersTab(\'accounts\')">บัญชีทั้งหมด <span style="font-size:11px;opacity:.65">('+S.users.length+')</span></button>'
    +'<button class="tab'+(!isAccounts?' t-all':'')+'" onclick="setUsersTab(\'audit\')">ประวัติการเข้าสู่ระบบ <span style="font-size:11px;opacity:.65">('+S.auditLogs.length+')</span></button>'
    +'</div>'
    +'</div>'
    +bodyHtml
    +'</div></div>';
}

// ─── MODAL ────────────────────────────────────────────────────
function renderModal(){
  if(!S.settingsItem){document.getElementById('modal-root').innerHTML='';return;}
  const item=S.inventory.find(i=>i.id===S.settingsItem);if(!item)return;
  const tc=TC[item.color]||TC.BLACK;const st=status(item);
  const eName=esc(item.name);const eModel=esc(item.model||'');
  const eLoc=esc(item.loc||'');const eSup=esc(item.sup||'');const eRem=esc(item.remarks||'');
  _openModal(`
  <div class="modal-bg" onclick="if(event.target===this)closeSettings()" role="dialog" aria-modal="true" aria-label="ตั้งค่า ${eName}">
    <div class="card fade-up" style="width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden">
      <div style="height:4px;background:${tc.hex}"></div>
      <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border2)">
        <div style="width:36px;height:36px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid ${tc.hex}">
          ${tonerDot(item.color,14)}
        </div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700;color:var(--text-primary)">${eName}</div>
          <div style="font-size:11px;color:var(--text-faint);margin-top:1px">${eModel}</div>
        </div>
        ${badge(st)}
        <button onclick="closeSettings()" class="icon-btn">${I.x}</button>
      </div>
      <div style="padding:18px 20px;display:flex;flex-direction:column;gap:14px">
        <div class="card-sm" style="padding:14px">
          <div style="font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">เกณฑ์สต็อก</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
            ${[['crit','วิกฤต',item.critical,'#dc2626'],['min','ขั้นต่ำ',item.min,'#d97706'],['max','สูงสุด',item.max,'#16a34a']].map(([id,lb,v,c])=>`
            <div>
              <div style="font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:6px">${lb}</div>
              <input id="sf-${id}" type="number" min="0" value="${v}" style="font-size:16px;font-weight:700;text-align:center;color:${c}"/>
            </div>`).join('')}
          </div>
          <div style="font-size:11px;color:var(--text-faint);margin-top:10px;text-align:center;background:var(--surface2);padding:6px;border-radius:8px">วิกฤต &lt; ขั้นต่ำ &lt; สูงสุด</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${[['bc','🔲 Barcode (ค่าจริงบนกล่อง)',esc(item.barcode||''),'เช่น 1P6AG00009148'],['loc','📍 ตำแหน่งจัดเก็บ',eLoc,'เช่น Rack A-1'],['sup','🚚 ซัพพลายเออร์',eSup,'เช่น Toshiba Thailand'],['rem','📝 หมายเหตุ',eRem,'บันทึกเพิ่มเติม']].map(([id,lb,v,ph])=>`
          <div>
            <label for="sf-${id}" style="display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">${lb}</label>
            <input id="sf-${id}" type="text" value="${v}" placeholder="${ph}"/>
          </div>`).join('')}
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--border2);background:var(--surface2)">
        <button onclick="closeSettings()" style="padding:10px 20px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-size:14px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background='var(--surface)'">ยกเลิก</button>
        <button onclick="saveSettings()" style="padding:10px 22px;border-radius:10px;background:#4f46e5;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;box-shadow:0 2px 8px rgba(79,70,229,.3)" onmouseover="this.style.background='#4338ca'" onmouseout="this.style.background='#4f46e5'">บันทึก</button>
      </div>
    </div>
  </div>`);
}

// ─── NOTIFICATIONS ────────────────────────────────────────────
function renderNotifPanel(){
  const uc=unread();
  document.getElementById('notif-root').innerHTML=`
  <div class="notif-overlay" onclick="toggleNotif()"></div>
  <div class="notif-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border2)">
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--text-primary)">การแจ้งเตือน</div>
        ${uc?`<div style="font-size:12px;color:var(--text-faint);margin-top:2px">${uc} ยังไม่ได้อ่าน</div>`:''}
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${uc?`<button onclick="markAllRead()" style="display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;background:var(--surface3);border:1px solid var(--border);color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif" onmouseover="this.style.background='#ede9fe';this.style.color='#4f46e5'" onmouseout="this.style.background='var(--surface3)';this.style.color='var(--text-muted)'">${I.check} อ่านทั้งหมด</button>`:''}
        <button class="icon-btn" onclick="toggleNotif()">${I.x}</button>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:10px">${renderNotifList()}</div>
  </div>`;
}
function renderNotifList(){
  const notifs=[...S.notifications].sort((a,b)=>({CRITICAL:0,WARNING:1,INFO:2}[a.type]-{CRITICAL:0,WARNING:1,INFO:2}[b.type]));
  if(!notifs.length)return`<div style="text-align:center;padding:60px 20px;color:var(--text-faint);font-size:14px">ไม่มีการแจ้งเตือน</div>`;
  return notifs.map(n=>{const nc=NIC[n.type];return`
  <div style="display:flex;gap:10px;padding:11px 12px;border-radius:10px;margin-bottom:5px;background:${n.read?'transparent':nc.bg};border:1px solid ${n.read?'transparent':nc.border};opacity:${n.read ? .55 : 1};transition:background .15s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='${n.read?'transparent':nc.bg}'">
    <span style="color:${nc.c};flex-shrink:0;margin-top:2px">${I[nc.icon]}</span>
    <div style="min-width:0">
      ${!n.read?`<span style="width:7px;height:7px;border-radius:50%;background:${nc.c};display:inline-block;margin-right:4px;vertical-align:middle"></span>`:''}
      <span style="font-size:13px;font-weight:600;color:var(--text-primary)">${esc(n.title)}</span>
      <div style="font-size:12px;color:var(--text-muted);margin-top:3px;line-height:1.5">${esc(n.msg)}</div>
      <div style="font-size:11px;color:var(--text-faint);margin-top:5px">${ago(n.date)}</div>
    </div>
  </div>`}).join('');
}

// ─── MAIN ─────────────────────────────────────────────────────
function renderContent(){
  if(!S.user)return;
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    el.classList.toggle('active',el.getAttribute('onclick')===`nav('${S.page}')`);
  });
  if(S.page==='dashboard')renderDashboard();
  else if(S.page==='inventory')renderInventory();
  else if(S.page==='history')renderHistory();
  else if(S.page==='settings')renderSettings();
  else if(S.page==='users')renderUsers();
}
function render(){if(!S.user){renderLogin();return;}renderShell();renderContent();}
document.addEventListener('compositionstart',function(e){
  if(e.target&&e.target.id==='search-input'){searchComposing=true;clearTimeout(searchTimer);}
});
document.addEventListener('compositionend',function(e){
  if(e.target&&e.target.id==='search-input'){searchComposing=false;setSearch(e.target.value);}
});
document.addEventListener('keydown',function(e){
  if(e.key!=='Escape')return;
  if(document.getElementById('modal-root')?.innerHTML)closeModal();
  else if(S.notifOpen)toggleNotif();
});
if(window._cdnLoad){window._cdnLoad.then(function(){if(!window._cdnFailed)initApp();});}
else{initApp();}
</script>
</body>
</html>
