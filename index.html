*::-webkit-scrollbar-track{background:#f1f5f9}
*::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;color:#1e293b;-webkit-font-smoothing:antialiased}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;transition:box-shadow .2s,transform .2s}
.card-hover:hover{box-shadow:0 8px 30px rgba(0,0,0,.1);transform:translateY(-2px)}
.card-sm{background:#fff;border:1px solid #e2e8f0;border-radius:12px}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;color:#64748b;border:1px solid transparent}
.sidebar-item:hover{background:#f1f5f9;color:#1e293b}
.sidebar-item.active{background:#ede9fe;color:#4f46e5;border-color:#c4b5fd}
.tab{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #e2e8f0;transition:all .15s;color:#64748b;background:#fff}
.tab:hover{background:#f8fafc;border-color:#cbd5e1;color:#1e293b}
.tab.t-all{background:#4f46e5;color:#fff;border-color:#4f46e5}
.tab.t-normal{background:#dcfce7;color:#16a34a;border-color:#86efac}
.tab.t-low{background:#fef3c7;color:#d97706;border-color:#fcd34d}
.tab.t-critical{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.tab.t-empty{background:#f1f5f9;color:#64748b;border-color:#cbd5e1}
.btn-add{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;background:#dcfce7;border:1px solid #86efac;color:#16a34a;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Sarabun',sans-serif}
.btn-add:hover{background:#bbf7d0;transform:scale(1.03)}
.btn-add:active{transform:scale(.97)}
.btn-add:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-use{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;background:#fff;border:1px solid #e2e8f0;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Sarabun',sans-serif}
.btn-use:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.btn-use:active{transform:scale(.97)}
.btn-use:disabled{opacity:.3;cursor:not-allowed;transform:none}
.progress-track{width:100%;height:8px;background:#f1f5f9;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
input,textarea,select{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;color:#1e293b;padding:9px 12px;font-size:14px;outline:none;width:100%;box-sizing:border-box;font-family:'Sarabun',sans-serif;transition:border .15s,background .15s}
input::placeholder,textarea::placeholder{color:#cbd5e1}
input:focus,textarea:focus,select:focus{border-color:#6366f1;background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
input[type=number]{font-family:'JetBrains Mono',monospace}
select option{background:#fff;color:#1e293b}
table{width:100%;border-collapse:collapse}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid #f1f5f9;white-space:nowrap}
td{padding:12px 16px;font-size:13px;color:#475569;border-bottom:1px solid #f8fafc}
tr:hover td{background:#f8fafc}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse-r{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .3s ease-out both}
.pulse-r{animation:pulse-r 1.8s ease-in-out infinite}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.35);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.notif-overlay{position:fixed;inset:0;z-index:40}
.notif-panel{position:fixed;right:0;top:0;bottom:0;width:340px;z-index:41;animation:slideIn .2s ease-out;background:#fff;border-left:1px solid #e2e8f0;box-shadow:-8px 0 40px rgba(0,0,0,.08);display:flex;flex-direction:column}
.icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;background:none;border:none;cursor:pointer;color:#94a3b8;transition:all .15s}
.icon-btn:hover{background:#f1f5f9;color:#4f46e5}
</style>

// Expected Supabase columns:
// inventory : id,name,model,mk,color,type,part,qty,min,critical,max,loc,sup,remarks,updated_at
// history   : id,iid,name,mk,color,oq,nq,ct,reason,changed_by,date
// notifications: id,type,title,msg,is_read,date
// users     : id,username,password,full_name,email,role,created_at,last_login
// audit_logs: id,username,full_name,role,timestamp
function mapInvFromDB(r){return{id:r.id,name:r.name,model:r.model,mk:r.mk,color:r.color,type:r.type,part:r.part,qty:r.qty,min:r.min??r.min_stock??3,critical:r.critical??r.critical_stock??1,max:r.max??r.max_stock??10,loc:r.loc||'',sup:r.sup||'',remarks:r.remarks||'',updatedAt:r.updated_at};}
function mapInvToDB(i){return{id:i.id,name:i.name,model:i.model,mk:i.mk,color:i.color,type:i.type,part:i.part,qty:i.qty,min:i.min,critical:i.critical,max:i.max,loc:i.loc||null,sup:i.sup||null,remarks:i.remarks||null,updated_at:i.updatedAt||new Date().toISOString()};}
function mapHistFromDB(r){return{id:r.id,iid:r.iid,name:r.name,mk:r.mk,color:r.color,oq:r.oq,nq:r.nq,ct:r.ct,reason:r.reason,user:r.changed_by,date:r.date};}
function mapHistToDB(h){return{id:h.id,iid:h.iid,name:h.name,mk:h.mk,color:h.color,oq:h.oq,nq:h.nq,ct:h.ct,reason:h.reason||null,changed_by:h.user,date:h.date};}
function mapNotifFromDB(r){return{id:r.id,type:r.type,title:r.title,msg:r.msg,read:r.is_read,date:r.date};}
function mapNotifToDB(n){return{id:n.id,type:n.type,title:n.title,msg:n.msg,is_read:n.read,date:n.date};}
function mapUserFromDB(r){return{id:r.id,username:r.username,password:r.password,fullName:r.full_name,email:r.email||'',role:r.role,createdAt:r.created_at,lastLogin:r.last_login};}
function mapUserToDB(u){return{id:u.id,username:u.username,password:u.password,full_name:u.fullName,email:u.email||null,role:u.role,created_at:u.createdAt||new Date().toISOString(),last_login:u.lastLogin||null};}
function mapAuditFromDB(r){return{id:r.id,username:r.username,fullName:r.full_name,role:r.role,timestamp:r.timestamp};}
function mapAuditToDB(a){return{id:a.id,username:a.username,full_name:a.fullName,role:a.role,timestamp:a.timestamp};}

async function loadFromSupabase(){
  const[invR,histR,notifR,usersR,auditR]=await Promise.all([
    sb.from('inventory').select('*').order('mk').order('part'),
    sb.from('history').select('*').order('date',{ascending:false}),
    sb.from('notifications').select('*').order('date',{ascending:false}),
    sb.from('users').select('*').order('created_at'),
    sb.from('audit_logs').select('*').order('timestamp',{ascending:false}).limit(200),
  ]);
  if(invR.error)throw new Error('inventory: '+invR.error.message);
  if(usersR.error)throw new Error('users: '+usersR.error.message);
  S.inventory=(invR.data||[]).map(mapInvFromDB);
  S.history=(histR.data||[]).map(mapHistFromDB);
  S.notifications=(notifR.data||[]).map(mapNotifFromDB);
  S.users=(usersR.data||[]).map(mapUserFromDB);
  S.auditLogs=(auditR.data||[]).map(mapAuditFromDB);
}
async function seedIfEmpty(){
  const now=new Date().toISOString();
  if(S.users.length===0){
    const{data,error}=await sb.from('users').insert(USERS.map(u=>mapUserToDB({...u,createdAt:now}))).select();
    if(!error&&data)S.users=data.map(mapUserFromDB);
  }
  if(S.inventory.length===0){
    const{data,error}=await sb.from('inventory').insert(DEF_INV.map(i=>mapInvToDB(i))).select();
    if(!error&&data){
      S.inventory=data.map(mapInvFromDB);
      await sb.from('history').insert(DEF_HIST.map(h=>mapHistToDB(h)));
      const{data:hd}=await sb.from('history').select('*').order('date',{ascending:false});
      if(hd)S.history=hd.map(mapHistFromDB);
      await sb.from('notifications').insert(defNotifs().map(n=>mapNotifToDB(n)));
      const{data:nd}=await sb.from('notifications').select('*').order('date',{ascending:false});
      if(nd)S.notifications=nd.map(mapNotifFromDB);
    }
  }
}
async function initApp(){
  showLoading();
  try{
    await loadFromSupabase();
    await seedIfEmpty();
    const raw=localStorage.getItem('toner-session');
    if(raw){
      try{
        const{id}=JSON.parse(raw);
        const found=S.users.find(x=>x.id===id);
        if(found){S.user=found;S.page='dashboard';}
      }catch(e){}
    }
  }catch(e){
    document.getElementById('app').innerHTML='<div style="padding:30px;font-family:monospace;color:#dc2626;background:#fee2e2;margin:20px;border-radius:12px;font-size:13px"><b>เชื่อมต่อ Supabase ไม่ได้</b><br><br>'+e.message+'<br><br><small>ตรวจสอบ SUPABASE_URL และ SUPABASE_KEY และ RLS policy</small></div>';
    return;
  }
  render();
}

function status(item){
  if(item.qty===0)return'OUT_OF_STOCK';
  if(item.qty<=item.critical)return'CRITICAL';
  if(item.qty<=item.min)return'LOW';
  return'NORMAL';
}

function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  const user=S.users.find(x=>x.username===u&&x.password===p);
  if(!user){S.loginErr='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';S.mode='login';renderLogin();return;}
  user.lastLogin=new Date().toISOString();
  sb.from('users').update({last_login:user.lastLogin}).eq('id',user.id);
  const log={id:uid(),username:user.username,fullName:user.fullName,role:user.role,timestamp:new Date().toISOString()};
  S.auditLogs.unshift(log);
  if(S.auditLogs.length>200)S.auditLogs=S.auditLogs.slice(0,200);
  sb.from('audit_logs').insert(mapAuditToDB(log));
  S.user=user;S.page='dashboard';S.loginErr='';S.regOk='';
  saveSession();render();
}
function doLogout(){S.user=null;S.page='login';S.mode='login';S.notifOpen=false;saveSession();render();}
function doRegister(){
  const u=document.getElementById('ru').value.trim();
  const fn=document.getElementById('rn').value.trim();
  const em=document.getElementById('re').value.trim().toLowerCase();
  const p=document.getElementById('rp').value;
  const p2=document.getElementById('rp2').value;
  S.regDraft={u,fn,em,p,p2};
  if(!u||!fn||!em||!p){S.regErr='กรุณากรอกข้อมูลให้ครบทุกช่อง';renderLogin();return;}
  if(p.length<6){S.regErr='รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';S.regDraft.p='';S.regDraft.p2='';renderLogin();return;}
  if(p!==p2){S.regErr='รหัสผ่านยืนยันไม่ตรงกัน';S.regDraft.p='';S.regDraft.p2='';renderLogin();return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){S.regErr='รูปแบบอีเมลไม่ถูกต้อง';renderLogin();return;}
  if(S.users.find(x=>x.username===u)){S.regErr='ชื่อผู้ใช้นี้ถูกใช้แล้ว';renderLogin();return;}
  if(S.users.find(x=>x.email&&x.email===em)){S.regErr='อีเมลนี้ถูกใช้แล้ว';renderLogin();return;}
  const nu={id:'u'+Date.now(),username:u,fullName:fn,email:em,password:p,role:'VIEWER',createdAt:new Date().toISOString()};
  S.users.push(nu);
  S.regErr='';S.regOk='สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบด้วยบัญชีใหม่';S.mode='login';S.regDraft={u:'',fn:'',em:'',p:'',p2:''};
  sb.from('users').insert(mapUserToDB(nu)).then(function(r){
    if(r.error){S.users=S.users.filter(x=>x.id!==nu.id);showToast('สมัครไม่สำเร็จ: '+(r.error.code==='23505'?'ชื่อผู้ใช้หรืออีเมลนี้ถูกใช้แล้ว':r.error.message));}
  });

}

function setSearch(v){

    const active=document.activeElement;

    const selStart=restoreFocus?active.selectionStart:null;
    const selEnd=restoreFocus?active.selectionEnd:null;
    const content=document.getElementById('content');
    const scrollTop=content?content.scrollTop:0;

    const winX=window.scrollX||0;

      try{input.focus({preventScroll:true});}catch(e){input.focus();}
      if(selStart!==null&&selEnd!==null)input.setSelectionRange(selStart,selEnd);
    }
  },180);
}

function changeQty(id,delta){
  if(!canEditInventory())return;
  const item=S.inventory.find(i=>i.id===id);if(!item)return;
  const newQty=Math.max(0,item.qty+delta);
  if(Math.abs(delta)>=3||newQty===0){openReasonPrompt(id,delta);return;}
  applyQtyChange(id,newQty,delta>0?'เพิ่มด้วยตนเอง':'ลดด้วยตนเอง',delta>=0?'INCREASE':'DECREASE');
}
function applyQtyChange(id,newQty,reason,ct){
  if(!canEditInventory())return;
  const item=S.inventory.find(i=>i.id===id);if(!item)return;
  const prev=status(item);const oq=item.qty;
  item.qty=Math.max(0,newQty);item.updatedAt=new Date().toISOString();
  const h={id:uid(),iid:id,name:item.name,mk:item.mk,color:item.color,oq,nq:item.qty,ct:ct||'SET',reason,user:S.user?.fullName||'System',date:new Date().toISOString()};
  S.history.unshift(h);
  const nst=status(item);
  let newNotif=null;
  if(nst!==prev){
    const nt=nst==='OUT_OF_STOCK'||nst==='CRITICAL'?'CRITICAL':'WARNING';
    newNotif={id:uid(),type:nt,read:false,date:new Date().toISOString(),title:SC[nst].label+' — '+item.name+' ('+item.mk+')',msg:item.name+' ('+item.mk+') อยู่ที่ '+item.qty+' กล่อง'};
    S.notifications.unshift(newNotif);
  }
  sb.from('inventory').upsert(mapInvToDB(item)).then(function(r){if(r.error)showToast('บันทึก inventory ไม่สำเร็จ');});
  sb.from('history').insert(mapHistToDB(h)).then(function(r){if(r.error)showToast('บันทึกประวัติไม่สำเร็จ');});
  if(newNotif)sb.from('notifications').insert(mapNotifToDB(newNotif));
  const card=document.querySelector(`[data-card="${id}"]`);
  if(card){const ctx=card.dataset?.context||'inventory';card.outerHTML=renderCard(item,S.inventory.indexOf(item),ctx);}
  const nb=document.getElementById('notif-badge');
  if(nb){nb.textContent=unread()||'';nb.style.display=unread()?'flex':'none';}
}
function openReasonPrompt(id,delta){
  if(!canEditInventory())return;
  const item=S.inventory.find(i=>i.id===id);if(!item)return;
  const newQty=Math.max(0,item.qty+delta);
  const tc=TC[item.color]||TC.BLACK;const isInc=delta>0;
  document.getElementById('modal-root').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="card fade-up" style="width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden">

async function confirmAddItem(){
  if(!isAdmin())return;
  const g=function(id){return document.getElementById(id)?.value?.trim()||'';};
  const name=g('ai-name');
  const model=g('ai-model');
  const mk=g('ai-mk');
  const showErr=function(msg){const el=document.getElementById('ai-err');if(el){el.textContent=msg;el.style.display='block';el.scrollIntoView({behavior:'smooth',block:'nearest'});}};
  if(!name){showErr('กรุณาระบุชื่อหมึก');return;}
  if(!model){showErr('กรุณาระบุชื่อเครื่องพิมพ์ (พิมพ์หรือเลือกจากรายการ)');return;}
  if(!mk){showErr('กรุณาระบุรุ่นสั้น (เช่น 330AC, 4518A)');return;}
  const qty=parseInt(g('ai-qty'))||0,mn=parseInt(g('ai-min'))||3,crit=parseInt(g('ai-crit'))||1,mx=parseInt(g('ai-max'))||10;
  if(crit>=mn){showErr('วิกฤต ('+crit+') ต้องน้อยกว่าขั้นต่ำ ('+mn+')');return;}
  if(mn>=mx){showErr('ขั้นต่ำ ('+mn+') ต้องน้อยกว่าสูงสุด ('+mx+')');return;}
  const saveBtn=document.querySelector('[onclick="confirmAddItem()"]');
  if(saveBtn){saveBtn.textContent='กำลังบันทึก…';saveBtn.disabled=true;}
  const nu={id:uid(),name,model,mk,color:g('ai-color')||'BLACK',type:g('ai-type')||'TONER',part:g('ai-part'),qty,min:mn,critical:crit,max:mx,loc:g('ai-loc'),sup:g('ai-sup'),remarks:'',updatedAt:new Date().toISOString()};
  const{error}=await sb.from('inventory').insert(mapInvToDB(nu));
  if(error){
    showErr('บันทึกไม่สำเร็จ: '+error.message);
    if(saveBtn){saveBtn.textContent='+ เพิ่มรายการ';saveBtn.disabled=false;}
    return;
  }
  S.inventory.push(nu);
  closeModal();
  renderContent();
  showToast('เพิ่ม "'+nu.name+'" ('+nu.mk+') เรียบร้อยแล้ว','ok');
}

// ─── ALERTS ───────────────────────────────────────────────────
function renderAlerts(){
  const alerts=S.notifications.filter(n=>!n.read).slice(0,6);
  if(!alerts.length)return'';
  const crit=alerts.filter(a=>a.type==='CRITICAL');
  const warn=alerts.filter(a=>a.type==='WARNING');
  const sorted=[...alerts].sort((a,b)=>({CRITICAL:0,WARNING:1,INFO:2}[a.type]-{CRITICAL:0,WARNING:1,INFO:2}[b.type]));
  return`<div class="card fade-up" style="padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block;flex-shrink:0" class="pulse-r"></span>
      <span style="font-size:15px;font-weight:700;color:#1e293b">ศูนย์แจ้งเตือน</span>
    </div>
    <div style="display:flex;gap:6px">
      ${crit.length?`<span style="font-size:11px;padding:3px 10px;border-radius:99px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;font-weight:700">${I.fire} ${crit.length} วิกฤต</span>`:''}
      ${warn.length?`<span style="font-size:11px;padding:3px 10px;border-radius:99px;background:#fef3c7;color:#d97706;border:1px solid #fcd34d;font-weight:700">${warn.length} ใกล้หมด</span>`:''}
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px">
  ${sorted.map(n=>{const nc=NIC[n.type];return`
  <div style="display:flex;gap:10px;padding:11px 14px;border-radius:10px;background:${nc.bg};border:1px solid ${nc.border}">
    <span style="color:${nc.c};flex-shrink:0;margin-top:2px">${I[nc.icon]}</span>
    <div>
      <div style="font-size:13px;font-weight:700;color:${nc.c};margin-bottom:2px">${n.title}</div>
      <div style="font-size:12px;color:#475569">${n.msg}</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:4px">${ago(n.date)}</div>
    </div>
  </div>`}).join('')}
  </div></div>`;
}

// ─── CARD ─────────────────────────────────────────────────────
function renderCard(item,idx,context){
  context=context||'inventory';
  const st=status(item);const tc=TC[item.color]||TC.BLACK;
  const p=pct(item.qty,item.max);
  const pcol=st==='NORMAL'?'#22c55e':st==='LOW'?'#f59e0b':st==='CRITICAL'?'#ef4444':'#e2e8f0';
  const canEdit=canEditInventory();
  const canEditSettings=isAdmin();
  const isEmpty=item.qty===0;
  const isDash=context==='dashboard';

  // Pre-compute to avoid triple-nested template literals
  const borderExtra=st==='CRITICAL'?'border-color:#fca5a5;box-shadow:0 0 0 3px rgba(220,38,38,.06);':st==='OUT_OF_STOCK'?'border-color:#cbd5e1;opacity:.75;':'';
  const wrapStyle='overflow:hidden;'+borderExtra+'animation-delay:'+(idx*35)+'ms';
  const qtyColor=isEmpty?'#cbd5e1':tc.hex;
  const qtyLabel=isEmpty?'หมดแล้ว':'กล่อง';
  const locLine=item.loc?`<div style="font-size:11px;color:#94a3b8;margin-bottom:12px;display:flex;align-items:center;gap:4px">${I.map} ${item.loc}</div>`:'';
  const locCenter=item.loc?`<div style="font-size:11px;color:#94a3b8;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:4px">${I.map} ${item.loc}</div>`:'';
  const minMax=`<div style="display:flex;justify-content:space-between;margin-top:5px"><span style="font-size:11px;color:#94a3b8">ขั้นต่ำ <span class="mono" style="color:#475569;font-weight:600">${item.min}</span></span><span style="font-size:11px;color:#94a3b8">สูงสุด <span class="mono" style="color:#475569;font-weight:600">${item.max}</span></span></div>`;
  const progressBar=`<div class="progress-track"><div class="progress-fill" style="width:${p}%;background:${pcol}"></div></div>`;

  // ── Dashboard card: minimal ───────────────────────────────
  if(isDash){
    const dashActions=canEdit?`
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;padding-top:10px;border-top:1px solid #f1f5f9">
      <button class="btn-use" onclick="changeQty('${item.id}',-1)" ${isEmpty?'disabled':''} style="padding:7px 12px;font-size:12px">${I.minus} ใช้แล้ว</button>
      <button onclick="openQtyEdit('${item.id}')" class="mono" style="font-size:14px;font-weight:800;color:#1e293b;min-width:22px;text-align:center;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:8px" title="คลิกเพื่อตั้งค่าจำนวน" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background=''">${item.qty}</button>
      <button class="btn-add" onclick="changeQty('${item.id}',1)" style="padding:7px 12px;font-size:12px">${I.plus} เติม</button>
    </div>`:'';
    return`<div data-card="${item.id}" data-context="dashboard" class="card card-hover fade-up" style="${wrapStyle}">
  <div style="height:4px;background:${tc.hex}"></div>
  <div style="padding:14px 16px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:7px">
        ${tonerDot(item.color,11)}
        <span style="font-size:14px;font-weight:700;color:#1e293b">${item.name}</span>
      </div>
      ${badge(st)}
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:${canEdit?10:0}px">
      <div style="text-align:center;min-width:54px">
        <div class="mono" style="font-size:${isEmpty?36:44}px;font-weight:800;line-height:1;color:${qtyColor}">${item.qty}</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:2px">${qtyLabel}</div>
      </div>
      <div style="flex:1">${progressBar}</div>
    </div>
    ${dashActions}
  </div></div>`;}

  // ── Inventory card: full ──────────────────────────────────
  const invBody=!canEdit?`
    <div style="text-align:center;padding:8px 0 14px">
      <div class="mono" style="font-size:${isEmpty?52:64}px;font-weight:800;line-height:1;color:${qtyColor}">${item.qty}</div>
      <div style="font-size:12px;color:#94a3b8;margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">${qtyLabel}</div>
      <div style="margin-top:12px">${progressBar}${minMax}</div>
      ${locCenter}
    </div>`:`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <div style="text-align:center;min-width:64px">
        <div class="mono" onclick="openQtyEdit('${item.id}')" title="คลิกเพื่อตั้งค่าจำนวน" style="font-size:${isEmpty?38:46}px;font-weight:800;line-height:1;color:${qtyColor};cursor:pointer;padding:4px 6px;border-radius:10px;transition:background .15s" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">${item.qty}</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">${qtyLabel}</div>
      </div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:11px;color:#94a3b8;font-weight:500">ระดับสต็อก</span>
          <span class="mono" style="font-size:11px;color:#64748b;font-weight:600">${p}%</span>
        </div>
        ${progressBar}${minMax}
      </div>
    </div>
    ${locLine}
    <div style="display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid #f1f5f9">
      ${canEditSettings?`<button class="icon-btn" onclick="openSettings('${item.id}')" title="ตั้งค่า">${I.cog}</button>`:`<span style="width:34px;height:34px;display:inline-block"></span>`}
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn-use" onclick="changeQty('${item.id}',-1)" ${isEmpty?'disabled':''}>${I.minus} ใช้แล้ว</button>
        <button onclick="openQtyEdit('${item.id}')" class="mono" title="คลิกเพื่อตั้งค่าจำนวน" style="font-size:15px;font-weight:800;color:#1e293b;min-width:20px;text-align:center;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:8px" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background=''">${item.qty}</button>
        <button class="btn-add" onclick="changeQty('${item.id}',1)">${I.plus} เติม</button>
      </div>
    </div>`;
  return`<div data-card="${item.id}" data-context="inventory" class="card card-hover fade-up" style="${wrapStyle}">
  <div style="height:4px;background:${tc.hex}"></div>
  <div style="padding:16px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:14px">
      <div>
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
          ${tonerDot(item.color,11)}
          <span style="font-size:15px;font-weight:700;color:#1e293b">${item.name}</span>
        </div>
        <div style="font-size:11px;color:#94a3b8">${item.mk} · <span style="font-family:'JetBrains Mono',monospace">${item.part}</span></div>
      </div>
      ${badge(st)}
    </div>
    ${invBody}
  </div></div>`;
}

// ─── GROUPED CARDS ────────────────────────────────────────────
function renderGroupedCards(items,context){
  context=context||'inventory';
  if(!items.length)return`<div style="text-align:center;padding:60px;color:#94a3b8">
    <div style="font-size:36px;margin-bottom:12px">📦</div>
    <div style="font-size:14px;font-weight:500">ไม่พบรายการที่ตรงกับตัวกรอง</div>
  </div>`;
  const order=['Toshiba e-STUDIO 330AC (เครื่องเล็ก)','Toshiba e-STUDIO 2521AC (เครื่องใหญ่)'];
  const grouped={};
  items.forEach(i=>{if(!grouped[i.model])grouped[i.model]=[];grouped[i.model].push(i);});
  const modelColors={'330AC':'#0891b2','2521AC':'#7c3aed'};
  return order.filter(m=>grouped[m]).map(model=>{
    const mk=grouped[model][0].mk;
    const mc=modelColors[mk]||'#4f46e5';
    const mItems=grouped[model];
    const mSt=mItems.reduce((a,i)=>{const s=status(i);if(s==='OUT_OF_STOCK')a.out++;else if(s==='CRITICAL')a.crit++;else if(s==='LOW')a.low++;else a.ok++;return a;},{ok:0,low:0,crit:0,out:0});
    return`<div style="margin-bottom:28px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #f1f5f9">

// ─── FILTER BAR ───────────────────────────────────────────────
function renderFilters(items){
  const count=f=>f==='ALL'?items.length:items.filter(i=>status(i)===f).length;
  const tabs=[['ALL','ทั้งหมด'],['NORMAL','ปกติ'],['LOW','ใกล้หมด'],['CRITICAL','วิกฤต'],['OUT_OF_STOCK','หมดแล้ว']];
  return`<div style="display:flex;gap:6px;flex-wrap:wrap">
  ${tabs.map(([f,lb])=>{const active=S.filter===f;const cls=active?(f==='ALL'?'t-all':f==='NORMAL'?'t-normal':f==='LOW'?'t-low':f==='CRITICAL'?'t-critical':'t-empty'):'';
  return`<button class="tab ${cls}" onclick="setFilter('${f}')">${lb} <span style="font-size:11px;opacity:.65">(${count(f)})</span></button>`}).join('')}
  </div>`;
}

  document.getElementById('content').innerHTML=`
  <div style="padding:18px;max-width:1200px">
    <div class="card fade-up" style="overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)">

            <td class="mono" style="font-weight:800;font-size:15px;color:${delta>0?'#16a34a':delta<0?'#dc2626':'#64748b'}">${delta>0?'+':''}${delta}</td>

    </div>`:''}
  </div>`;

function renderNotifPanel(){
  const uc=unread();
  document.getElementById('notif-root').innerHTML=`
  <div class="notif-overlay" onclick="toggleNotif()"></div>
  <div class="notif-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid #f1f5f9">
      <div>
        <div style="font-size:15px;font-weight:700;color:#1e293b">การแจ้งเตือน</div>
        ${uc?`<div style="font-size:12px;color:#94a3b8;margin-top:2px">${uc} ยังไม่ได้อ่าน</div>`:''}
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${uc?`<button onclick="markAllRead()" style="display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;background:#f1f5f9;border:1px solid #e2e8f0;color:#64748b;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif" onmouseover="this.style.background='#ede9fe';this.style.color='#4f46e5'" onmouseout="this.style.background='#f1f5f9';this.style.color='#64748b'">${I.check} อ่านทั้งหมด</button>`:''}
        <button class="icon-btn" onclick="toggleNotif()">${I.x}</button>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:10px">${renderNotifList()}</div>
  </div>`;
}
function renderNotifList(){
  const notifs=[...S.notifications].sort((a,b)=>({CRITICAL:0,WARNING:1,INFO:2}[a.type]-{CRITICAL:0,WARNING:1,INFO:2}[b.type]));
  if(!notifs.length)return`<div style="text-align:center;padding:60px 20px;color:#94a3b8;font-size:14px">ไม่มีการแจ้งเตือน</div>`;
  return notifs.map(n=>{const nc=NIC[n.type];return`
  <div style="display:flex;gap:10px;padding:11px 12px;border-radius:10px;margin-bottom:5px;background:${n.read?'transparent':nc.bg};border:1px solid ${n.read?'transparent':nc.border};opacity:${n.read ? .55 : 1};transition:background .15s" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='${n.read?'transparent':nc.bg}'">
    <span style="color:${nc.c};flex-shrink:0;margin-top:2px">${I[nc.icon]}</span>
    <div style="min-width:0">
      ${!n.read?`<span style="width:7px;height:7px;border-radius:50%;background:${nc.c};display:inline-block;margin-right:4px;vertical-align:middle"></span>`:''}
      <span style="font-size:13px;font-weight:600;color:#1e293b">${n.title}</span>
      <div style="font-size:12px;color:#64748b;margin-top:3px;line-height:1.5">${n.msg}</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:5px">${ago(n.date)}</div>
    </div>
  </div>`}).join('');
}

// ─── MAIN ─────────────────────────────────────────────────────
function renderContent(){
  if(!S.user)return;
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    el.classList.toggle('active',el.getAttribute('onclick')===`nav('${S.page}')`);
  });
  if(S.page==='dashboard')renderDashboard();
  else if(S.page==='inventory')renderInventory();
  else if(S.page==='history')renderHistory();
  else if(S.page==='settings')renderSettings();
  else if(S.page==='users')renderUsers();
}
function render(){if(!S.user){renderLogin();return;}renderShell();renderContent();}
document.addEventListener('compositionstart',function(e){
  if(e.target&&e.target.id==='search-input'){searchComposing=true;clearTimeout(searchTimer);}
});
document.addEventListener('compositionend',function(e){
  if(e.target&&e.target.id==='search-input'){searchComposing=false;setSearch(e.target.value);}
});
initApp();
</script>
</body>
</html>
