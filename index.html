*{box-sizing:border-box;margin:0;padding:0}
*::-webkit-scrollbar{width:5px;height:5px}
*::-webkit-scrollbar-track{background:var(--surface3)}
*::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
body{font-family:'Sarabun',sans-serif;background:var(--bg-main);color:var(--text-primary);-webkit-font-smoothing:antialiased}
body.modal-open{overflow:hidden}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;transition:box-shadow .2s,transform .2s}
.card-hover:hover{box-shadow:0 8px 30px rgba(0,0,0,.1);transform:translateY(-2px)}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:12px}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text-muted);border:1px solid transparent}
.sidebar-item:hover{background:var(--surface3);color:var(--text-primary)}
.sidebar-item.active{background:#ede9fe;color:#4f46e5;border-color:#c4b5fd}
.tab{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);transition:all .15s;color:var(--text-muted);background:var(--surface)}
.tab:hover{background:var(--surface2);border-color:var(--text-placeholder);color:var(--text-primary)}
.tab.t-all{background:#4f46e5;color:#fff;border-color:#4f46e5}
.tab.t-normal{background:#dcfce7;color:#16a34a;border-color:#86efac}
.tab.t-low{background:#fef3c7;color:#d97706;border-color:#fcd34d}
.tab.t-critical{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.tab.t-empty{background:var(--surface3);color:var(--text-muted);border-color:var(--text-placeholder)}
.btn-add{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;background:#dcfce7;border:1px solid #86efac;color:#16a34a;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Sarabun',sans-serif}
.btn-add:hover{background:#bbf7d0;transform:scale(1.03)}
.btn-add:active{transform:scale(.97)}
.btn-add:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-use{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Sarabun',sans-serif}
.btn-use:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.btn-use:active{transform:scale(.97)}
.btn-use:disabled{opacity:.3;cursor:not-allowed;transform:none}
.progress-track{width:100%;height:8px;background:var(--border2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
input,textarea,select{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);padding:9px 12px;font-size:14px;outline:none;width:100%;box-sizing:border-box;font-family:'Sarabun',sans-serif;transition:border .15s,background .15s}
input::placeholder,textarea::placeholder{color:var(--text-placeholder)}
input:focus,textarea:focus,select:focus{border-color:#6366f1;background:var(--surface);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
input[type=number]{font-family:'JetBrains Mono',monospace}
select option{background:var(--surface);color:var(--text-primary)}
table{width:100%;border-collapse:collapse}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border2);white-space:nowrap}
td{padding:12px 16px;font-size:13px;color:var(--text-secondary);border-bottom:1px solid var(--border2)}
tr:hover td{background:var(--surface2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse-r{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .3s ease-out both}
.pulse-r{animation:pulse-r 1.8s ease-in-out infinite}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.35);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.notif-overlay{position:fixed;inset:0;z-index:40}
.notif-panel{position:fixed;right:0;top:0;bottom:0;width:340px;z-index:41;animation:slideIn .2s ease-out;background:var(--surface);border-left:1px solid var(--border);box-shadow:-8px 0 40px rgba(0,0,0,.08);display:flex;flex-direction:column}
.icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;background:none;border:none;cursor:pointer;color:var(--text-faint);transition:all .15s}
.icon-btn:hover{background:var(--surface3);color:#4f46e5}
.icon-btn:focus-visible,button:focus-visible{outline:2px solid #6366f1;outline-offset:2px}
:root{

function mapInvToDB(i){return{id:i.id,name:i.name,model:i.model,mk:i.mk,color:i.color,type:i.type,part:i.part,qty:i.qty,min:i.min,critical:i.critical,max:i.max,loc:i.loc||null,sup:i.sup||null,remarks:i.remarks||null,barcode:i.barcode||null,updated_at:i.updatedAt||new Date().toISOString()};}
function mapHistFromDB(r){return{id:r.id,iid:r.iid,name:r.name,mk:r.mk,color:r.color,oq:r.oq,nq:r.nq,ct:r.ct,reason:r.reason,user:r.changed_by,date:r.date};}
function mapHistToDB(h){return{id:h.id,iid:h.iid,name:h.name,mk:h.mk,color:h.color,oq:h.oq,nq:h.nq,ct:h.ct,reason:h.reason||null,changed_by:h.user,date:h.date};}
function mapNotifFromDB(r){return{id:r.id,type:r.type,title:r.title,msg:r.msg,read:r.is_read,date:r.date};}

function mapUserFromDB(r){return{id:r.id,username:r.username,password:r.password,fullName:r.full_name,email:r.email||'',role:r.role,createdAt:r.created_at,lastLogin:r.last_login};}
function mapUserToDB(u){return{id:u.id,username:u.username,password:u.password,full_name:u.fullName,email:u.email||null,role:u.role,created_at:u.createdAt||new Date().toISOString(),last_login:u.lastLogin||null};}

async function loadFromSupabase(){
  const[invR,histR,notifR,usersR,auditR]=await Promise.all([
    sb.from('inventory').select('*').order('mk').order('part'),
    sb.from('history').select('*').order('date',{ascending:false}),
    sb.from('notifications').select('*').order('date',{ascending:false}),
    sb.from('users').select('*').order('created_at'),
    sb.from('audit_logs').select('*').order('timestamp',{ascending:false}).limit(200),
  ]);
  if(invR.error)throw new Error('inventory: '+invR.error.message);
  if(usersR.error)throw new Error('users: '+usersR.error.message);
  S.inventory=(invR.data||[]).map(mapInvFromDB);
  S.history=(histR.data||[]).map(mapHistFromDB);
  S.notifications=(notifR.data||[]).map(mapNotifFromDB);
  S.users=(usersR.data||[]).map(mapUserFromDB);
  S.auditLogs=(auditR.data||[]).map(mapAuditFromDB);
}
async function seedIfEmpty(){
  const now=new Date().toISOString();
  if(S.users.length===0){
    const{data,error}=await sb.from('users').insert(USERS.map(u=>mapUserToDB({...u,createdAt:now}))).select();
    if(!error&&data)S.users=data.map(mapUserFromDB);
  }
  if(S.inventory.length===0){
    const{data,error}=await sb.from('inventory').insert(DEF_INV.map(i=>mapInvToDB(i))).select();
    if(!error&&data){
      S.inventory=data.map(mapInvFromDB);
      await sb.from('history').insert(DEF_HIST.map(h=>mapHistToDB(h)));
      const{data:hd}=await sb.from('history').select('*').order('date',{ascending:false});
      if(hd)S.history=hd.map(mapHistFromDB);
      await sb.from('notifications').insert(defNotifs().map(n=>mapNotifToDB(n)));
      const{data:nd}=await sb.from('notifications').select('*').order('date',{ascending:false});
      if(nd)S.notifications=nd.map(mapNotifFromDB);
    }
  }
}
function initRealtime(){
  sb.channel('toner-realtime')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'inventory'},function(payload){
      const updated=mapInvFromDB(payload.new);
      const idx=S.inventory.findIndex(function(i){return i.id===updated.id;});
      if(idx!==-1){S.inventory[idx]=updated;renderContent();}
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'history'},function(payload){
      const entry=mapHistFromDB(payload.new);
      if(!S.history.find(function(h){return h.id===entry.id;})){S.history.unshift(entry);}
    })
    .subscribe();
}
async function initApp(){
  S.theme=localStorage.getItem('toner-theme')||'auto';
  applyTheme();
  showLoading();
  try{
    await loadFromSupabase();
    await seedIfEmpty();
    initRealtime();
    const raw=localStorage.getItem('toner-session');
    if(raw){
      try{
        const{id}=JSON.parse(raw);
        const found=S.users.find(x=>x.id===id);
        if(found){S.user=found;S.page='dashboard';}
      }catch(e){}
    }
  }catch(e){
    document.getElementById('app').innerHTML='<div style="padding:30px;font-family:monospace;color:#dc2626;background:#fee2e2;margin:20px;border-radius:12px;font-size:13px"><b>เชื่อมต่อ Supabase ไม่ได้</b><br><br>'+e.message+'<br><br><small>ตรวจสอบ SUPABASE_URL และ SUPABASE_KEY และ RLS policy</small></div>';
    return;
  }
  S.theme=localStorage.getItem('toner-theme')||'auto';
  S.scale=localStorage.getItem('toner-scale')||'auto';
  applyScale();
  render();
}

function status(item){
  if(item.qty===0)return'OUT_OF_STOCK';
  if(item.qty<=item.critical)return'CRITICAL';
  if(item.qty<=item.min)return'LOW';
  return'NORMAL';
}

async function sendTeamsAlert(title,message,statusType,webhookUrl){
  if(!webhookUrl)return;
  const themeColor=statusType==='OUT_OF_STOCK'||statusType==='CRITICAL'?'dc2626':'d97706';
  const statusLabel=statusType==='OUT_OF_STOCK'?'หมดแล้ว':statusType==='CRITICAL'?'วิกฤต':'ใกล้หมด';
  const payload={
    '@type':'MessageCard',
    '@context':'http://schema.org/extensions',
    themeColor,
    summary:title,
    sections:[{
      activityTitle:title,
      activitySubtitle:'TonerTrack · ระบบจัดการสต็อกหมึกพิมพ์',
      activityText:message,
      facts:[
        {name:'สถานะ',value:statusLabel},
        {name:'เวลา',value:new Date().toLocaleString('th-TH')},
      ],
      markdown:false,
    }],
  };
  try{
    await fetch(webhookUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
    });
  }catch(e){
    console.error('[TeamsAlert] webhook failed:',e);
  }
}

function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  const user=S.users.find(x=>x.username===u&&x.password===p);
  if(!user){S.loginErr='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';S.mode='login';renderLogin();return;}
  user.lastLogin=new Date().toISOString();
  sb.from('users').update({last_login:user.lastLogin}).eq('id',user.id);
  const log={id:uid(),username:user.username,fullName:user.fullName,role:user.role,timestamp:new Date().toISOString()};
  S.auditLogs.unshift(log);
  if(S.auditLogs.length>200)S.auditLogs=S.auditLogs.slice(0,200);
  sb.from('audit_logs').insert(mapAuditToDB(log));
  S.user=user;S.page='dashboard';S.loginErr='';S.regOk='';
  saveSession();render();
}
function doLogout(){S.user=null;S.page='login';S.mode='login';S.notifOpen=false;saveSession();render();}
function doRegister(){
  const u=document.getElementById('ru').value.trim();
  const fn=document.getElementById('rn').value.trim();
  const em=document.getElementById('re').value.trim().toLowerCase();
  const p=document.getElementById('rp').value;
  const p2=document.getElementById('rp2').value;
  S.regDraft={u,fn,em,p,p2};
  if(!u||!fn||!em||!p){S.regErr='กรุณากรอกข้อมูลให้ครบทุกช่อง';renderLogin();return;}
  if(p.length<6){S.regErr='รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';S.regDraft.p='';S.regDraft.p2='';renderLogin();return;}
  if(p!==p2){S.regErr='รหัสผ่านยืนยันไม่ตรงกัน';S.regDraft.p='';S.regDraft.p2='';renderLogin();return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){S.regErr='รูปแบบอีเมลไม่ถูกต้อง';renderLogin();return;}
  if(S.users.find(x=>x.username===u)){S.regErr='ชื่อผู้ใช้นี้ถูกใช้แล้ว';renderLogin();return;}
  if(S.users.find(x=>x.email&&x.email===em)){S.regErr='อีเมลนี้ถูกใช้แล้ว';renderLogin();return;}
  const nu={id:'u'+Date.now(),username:u,fullName:fn,email:em,password:p,role:'VIEWER',createdAt:new Date().toISOString()};
  S.users.push(nu);
  S.regErr='';S.regOk='สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบด้วยบัญชีใหม่';S.mode='login';S.regDraft={u:'',fn:'',em:'',p:'',p2:''};
  sb.from('users').insert(mapUserToDB(nu)).then(function(r){
    if(r.error){S.users=S.users.filter(x=>x.id!==nu.id);showToast('สมัครไม่สำเร็จ: '+(r.error.code==='23505'?'ชื่อผู้ใช้หรืออีเมลนี้ถูกใช้แล้ว':r.error.message));}
  });
  renderLogin();
}

function changeQty(id,delta){
  if(!canEditInventory())return;
  const item=S.inventory.find(i=>i.id===id);if(!item)return;
  const newQty=Math.max(0,item.qty+delta);
  if(Math.abs(delta)>=3||newQty===0){openReasonPrompt(id,delta);return;}
  applyQtyChange(id,newQty,delta>0?'เพิ่มด้วยตนเอง':'ลดด้วยตนเอง',delta>=0?'INCREASE':'DECREASE');
}
function applyQtyChange(id,newQty,reason,ct){
  if(!canEditInventory())return;
  const item=S.inventory.find(i=>i.id===id);if(!item)return;
  const prev=status(item);const oq=item.qty;
  item.qty=Math.max(0,newQty);item.updatedAt=new Date().toISOString();
  const h={id:uid(),iid:id,name:item.name,mk:item.mk,color:item.color,oq,nq:item.qty,ct:ct||'SET',reason,user:S.user?.fullName||'System',date:new Date().toISOString()};
  S.history.unshift(h);
  const nst=status(item);
  let newNotif=null;
  if(nst!==prev){
    const nt=nst==='OUT_OF_STOCK'||nst==='CRITICAL'?'CRITICAL':'WARNING';
    newNotif={id:uid(),type:nt,read:false,date:new Date().toISOString(),title:SC[nst].label+' — '+item.name+' ('+item.mk+')',msg:item.name+' ('+item.mk+') อยู่ที่ '+item.qty+' กล่อง'};
    S.notifications.unshift(newNotif);
  }
  sb.from('inventory').upsert(mapInvToDB(item)).then(function(r){if(r.error)showToast('บันทึกไม่สำเร็จ: '+r.error.message,'error');});
  sb.from('history').insert(mapHistToDB(h)).then(function(r){if(r.error)showToast('ประวัติ: '+r.error.message,'error');});
  if(newNotif){
    sb.from('notifications').insert(mapNotifToDB(newNotif));
    if(nst!=='NORMAL')sendTeamsAlert(newNotif.title,newNotif.msg,nst,MS_TEAMS_WEBHOOKS[item.mk]||'');
  }
  const card=document.querySelector(`[data-card="${id}"]`);
  if(card){const ctx=card.dataset?.context||'inventory';card.outerHTML=renderCard(item,S.inventory.indexOf(item),ctx);}
  const nb=document.getElementById('notif-badge');
  if(nb){nb.textContent=unread()||'';nb.style.display=unread()?'flex':'none';}
}

  if(mode==='OUT'){

    inBtn.style.background='var(--surface2)';inBtn.style.color='var(--text-muted)';inBtn.style.borderColor='var(--border)';
  } else {

    outBtn.style.background='var(--surface2)';outBtn.style.color='var(--text-muted)';outBtn.style.borderColor='var(--border)';
  }
  const label=document.getElementById('scan-mode-label');
  if(label){
    label.textContent=mode==='OUT'?'โหมด: เบิกออก (ใช้หมึก)':'โหมด: รับเข้า (เติมสต็อก)';
    label.style.color=mode==='OUT'?'#dc2626':'#16a34a';
  }
}
function onScanSuccess(decodedText){
  if(isProcessingScan)return;
  const code=decodedText.trim();
  const item=S.inventory.find(function(i){
    return(i.barcode&&i.barcode===code)||i.part.includes(code);
  });
  if(!item){showToast('ไม่พบ: "'+code+'"','error');return;}
  if(scanMode==='OUT'&&item.qty===0){showToast('หมึกหมดแล้ว ไม่สามารถเบิกได้','error');return;}
  isProcessingScan=true;
  const newQty=scanMode==='OUT'?item.qty-1:item.qty+1;
  const actionType=scanMode==='OUT'?'DECREASE':'INCREASE';
  const reason=scanMode==='OUT'?'สแกนออก (ใช้หมึก)':'สแกนเข้า (เติมสต็อก)';
  applyQtyChange(item.id,newQty,reason,actionType);
  const verb=scanMode==='OUT'?'เบิกออก':'รับเข้า';
  showToast(verb+' '+item.name+' ('+item.mk+') เหลือ '+newQty+' กล่อง','ok');
  setTimeout(function(){isProcessingScan=false;},2000);
}
async function startScanner(){
  const qr=new Html5Qrcode('reader');
  html5QrcodeInstance=qr;
  const cfg={fps:10,qrbox:{width:250,height:180}};
  // Try camera ID first (more compatible with iOS Safari)
  try{
    const cameras=await Html5Qrcode.getCameras();
    if(cameras&&cameras.length){
      const back=cameras.find(function(c){return/back|rear|environment/i.test(c.label);})||cameras[cameras.length-1];
      try{await qr.start(back.id,cfg,onScanSuccess,function(){});return;}catch(e){}
    }
  }catch(e){}
  // Fallback: facingMode constraints
  try{
    await qr.start({facingMode:{exact:'environment'}},cfg,onScanSuccess,function(){});
  }catch(e1){
    try{
      await qr.start({facingMode:'environment'},cfg,onScanSuccess,function(){});
    }catch(e2){
      html5QrcodeInstance=null;
      showToast('ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการเข้าถึงกล้องในการตั้งค่า','error');
    }
  }
}

async function confirmAddItem(){
  if(!isAdmin())return;
  const g=function(id){return document.getElementById(id)?.value?.trim()||'';};
  const name=g('ai-name');
  const model=g('ai-model');
  const mk=g('ai-mk');
  const showErr=function(msg){const el=document.getElementById('ai-err');if(el){el.textContent=msg;el.style.display='block';el.scrollIntoView({behavior:'smooth',block:'nearest'});}};
  if(!name){showErr('กรุณาระบุชื่อหมึก');return;}
  if(!model){showErr('กรุณาระบุชื่อเครื่องพิมพ์ (พิมพ์หรือเลือกจากรายการ)');return;}
  if(!mk){showErr('กรุณาระบุรุ่นสั้น (เช่น 330AC, 4518A)');return;}
  const qty=parseInt(g('ai-qty'))||0,mn=parseInt(g('ai-min'))||3,crit=parseInt(g('ai-crit'))||1,mx=parseInt(g('ai-max'))||10;
  if(crit>=mn){showErr('วิกฤต ('+crit+') ต้องน้อยกว่าขั้นต่ำ ('+mn+')');return;}
  if(mn>=mx){showErr('ขั้นต่ำ ('+mn+') ต้องน้อยกว่าสูงสุด ('+mx+')');return;}
  const saveBtn=document.querySelector('[onclick="confirmAddItem()"]');
  if(saveBtn){saveBtn.textContent='กำลังบันทึก…';saveBtn.disabled=true;}
  const nu={id:uid(),name,model,mk,color:g('ai-color')||'BLACK',type:g('ai-type')||'TONER',part:g('ai-part'),qty,min:mn,critical:crit,max:mx,loc:g('ai-loc'),sup:g('ai-sup'),remarks:'',updatedAt:new Date().toISOString()};
  const{error}=await sb.from('inventory').insert(mapInvToDB(nu));
  if(error){
    showErr('บันทึกไม่สำเร็จ: '+error.message);
    if(saveBtn){saveBtn.textContent='+ เพิ่มรายการ';saveBtn.disabled=false;}
    return;
  }
  S.inventory.push(nu);
  closeModal();
  renderContent();
  showToast('เพิ่ม "'+nu.name+'" ('+nu.mk+') เรียบร้อยแล้ว','ok');
}

// ─── KPI ──────────────────────────────────────────────────────
function renderKPI(st){
  const cards=[
    {label:'ทั้งหมด',val:st.total,c:'#4f46e5',bg:'#ede9fe',border:'#c4b5fd',filter:'ALL'},
    {label:'ปกติ',val:st.normal,c:'#16a34a',bg:'#dcfce7',border:'#86efac',filter:'NORMAL'},
    {label:'ใกล้หมด',val:st.low,c:'#d97706',bg:'#fef3c7',border:'#fcd34d',filter:'LOW'},
    {label:'วิกฤต',val:st.critical,c:'#dc2626',bg:'#fee2e2',border:'#fca5a5',filter:'CRITICAL'},
    {label:'หมดแล้ว',val:st.outOfStock,c:'#64748b',bg:'#f1f5f9',border:'#cbd5e1',filter:'OUT_OF_STOCK'},
    {label:'อัปเดตวันนี้',val:st.today,c:'#0891b2',bg:'#cffafe',border:'#67e8f9',filter:null},
  ];
  return`<div class="kpi-grid">
  ${cards.map((c,i)=>{
    const isActive=c.filter&&S.filter===c.filter;
    const clickable=!!c.filter;
    const activeStyle=isActive?`border:2px solid ${c.c};box-shadow:0 0 0 3px ${c.bg};`:'border:1px solid var(--border);';
    const interactStyle=clickable?`cursor:pointer;transition:box-shadow .15s,transform .1s,border .1s;`:'';
    const onclickAttr=clickable?`onclick="setFilter('${c.filter}')" `:'';
    return`
  <div class="card fade-up" ${onclickAttr}style="padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.04);animation-delay:${i*40}ms;${activeStyle}${interactStyle}">
    <div style="font-size:12px;color:${isActive?c.c:'var(--text-faint)'};font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">${c.label}${isActive?' ✓':''}</div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:38px;font-weight:800;color:${c.c};font-family:'JetBrains Mono',monospace;line-height:1">${c.val}</div>
      <div style="width:38px;height:38px;border-radius:10px;background:${c.bg};border:1px solid ${c.border};display:flex;align-items:center;justify-content:center;flex-shrink:0"></div>
    </div>
  </div>`;}).join('')}
  </div>`;
}

// ─── ALERTS ───────────────────────────────────────────────────
function renderAlerts(){
  const alerts=S.notifications.filter(n=>!n.read).slice(0,6);
  if(!alerts.length)return'';
  const crit=alerts.filter(a=>a.type==='CRITICAL');
  const warn=alerts.filter(a=>a.type==='WARNING');
  const sorted=[...alerts].sort((a,b)=>({CRITICAL:0,WARNING:1,INFO:2}[a.type]-{CRITICAL:0,WARNING:1,INFO:2}[b.type]));
  return`<div class="card fade-up" style="padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block;flex-shrink:0" class="pulse-r"></span>
      <span style="font-size:15px;font-weight:700;color:var(--text-primary)">ศูนย์แจ้งเตือน</span>
    </div>
    <div style="display:flex;gap:6px">
      ${crit.length?`<span style="font-size:11px;padding:3px 10px;border-radius:99px;background:var(--nic-crit-bg);color:var(--nic-crit-c);border:1px solid var(--nic-crit-br);font-weight:700">${I.fire} ${crit.length} วิกฤต</span>`:''}
      ${warn.length?`<span style="font-size:11px;padding:3px 10px;border-radius:99px;background:var(--nic-warn-bg);color:var(--nic-warn-c);border:1px solid var(--nic-warn-br);font-weight:700">${warn.length} ใกล้หมด</span>`:''}
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px">
  ${sorted.map(n=>{const nc=NIC[n.type];return`
  <div style="display:flex;gap:10px;padding:11px 14px;border-radius:10px;background:${nc.bg};border:1px solid ${nc.border}">
    <span style="color:${nc.c};flex-shrink:0;margin-top:2px">${I[nc.icon]}</span>
    <div>
      <div style="font-size:13px;font-weight:700;color:${nc.c};margin-bottom:2px">${esc(n.title)}</div>
      <div style="font-size:12px;color:var(--text-secondary)">${esc(n.msg)}</div>
      <div style="font-size:11px;color:var(--text-faint);margin-top:4px">${ago(n.date)}</div>
    </div>
  </div>`}).join('')}
  </div></div>`;
}

// ─── CARD ─────────────────────────────────────────────────────
function renderCard(item,idx,context){
  context=context||'inventory';
  const st=status(item);const tc=TC[item.color]||TC.BLACK;
  const p=pct(item.qty,item.max);
  const pcol=st==='NORMAL'?'var(--sc-normal-c)':st==='LOW'?'var(--sc-low-c)':st==='CRITICAL'?'var(--sc-crit-c)':'var(--sc-out-br)';
  const canEdit=canEditInventory();
  const canEditSettings=isAdmin();
  const isEmpty=item.qty===0;
  const isDash=context==='dashboard';

  // Pre-compute to avoid triple-nested template literals
  const eName=esc(item.name);const ePart=esc(item.part||'');const eMk=esc(item.mk);const eLoc=esc(item.loc||'');
  const borderExtra=st==='CRITICAL'?'border-color:var(--sc-crit-br);box-shadow:0 0 0 3px rgba(220,38,38,.06);':st==='OUT_OF_STOCK'?'border-color:var(--text-placeholder);opacity:.75;':'';
  const wrapStyle='overflow:hidden;'+borderExtra+'animation-delay:'+(idx*35)+'ms';
  const qtyColor=isEmpty?'var(--text-placeholder)':tc.hex;
  const qtyLabel=isEmpty?'หมดแล้ว':'กล่อง';
  const locLine=item.loc?`<div style="font-size:11px;color:var(--text-faint);margin-bottom:12px;display:flex;align-items:center;gap:4px">${I.map} ${eLoc}</div>`:'';
  const locCenter=item.loc?`<div style="font-size:11px;color:var(--text-faint);margin-top:10px;display:flex;align-items:center;justify-content:center;gap:4px">${I.map} ${eLoc}</div>`:'';
  const minMax=`<div style="display:flex;justify-content:space-between;margin-top:5px"><span style="font-size:11px;color:var(--text-faint)">ขั้นต่ำ <span class="mono" style="color:var(--text-secondary);font-weight:600">${item.min}</span></span><span style="font-size:11px;color:var(--text-faint)">สูงสุด <span class="mono" style="color:var(--text-secondary);font-weight:600">${item.max}</span></span></div>`;
  const progressBar=`<div class="progress-track"><div class="progress-fill" style="width:${p}%;background:${pcol}"></div></div>`;

  // ── Dashboard card: minimal ───────────────────────────────
  if(isDash){
    const dashActions=canEdit?`
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;padding-top:10px;border-top:1px solid var(--border2)">
      <button class="btn-use" onclick="changeQty('${item.id}',-1)" ${isEmpty?'disabled':''} style="padding:7px 12px;font-size:12px">${I.minus} ใช้แล้ว</button>
      <button onclick="openQtyEdit('${item.id}')" class="mono" style="font-size:14px;font-weight:800;color:var(--text-primary);min-width:22px;text-align:center;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:8px" title="คลิกเพื่อตั้งค่าจำนวน" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background=''">${item.qty}</button>
      <button class="btn-add" onclick="changeQty('${item.id}',1)" style="padding:7px 12px;font-size:12px">${I.plus} เติม</button>
    </div>`:'';
    return`<div data-card="${item.id}" data-context="dashboard" class="card card-hover fade-up" style="${wrapStyle}">
  <div style="height:4px;background:${tc.hex}"></div>
  <div style="padding:14px 16px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:7px">
        ${tonerDot(item.color,11)}
        <span style="font-size:14px;font-weight:700;color:var(--text-primary)">${eName}</span>
      </div>
      ${badge(st)}
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:${canEdit?10:0}px">
      <div style="text-align:center;min-width:54px">
        <div class="mono" style="font-size:${isEmpty?36:44}px;font-weight:800;line-height:1;color:${qtyColor}">${item.qty}</div>
        <div style="font-size:10px;color:var(--text-faint);margin-top:2px">${qtyLabel}</div>
      </div>
      <div style="flex:1">${progressBar}</div>
    </div>
    ${dashActions}
  </div></div>`;}

  // ── Inventory card: full ──────────────────────────────────
  const invBody=!canEdit?`
    <div style="text-align:center;padding:8px 0 14px">
      <div class="mono" style="font-size:${isEmpty?52:64}px;font-weight:800;line-height:1;color:${qtyColor}">${item.qty}</div>
      <div style="font-size:12px;color:var(--text-faint);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">${qtyLabel}</div>
      <div style="margin-top:12px">${progressBar}${minMax}</div>
      ${locCenter}
    </div>`:`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <div style="text-align:center;min-width:64px">
        <div class="mono" onclick="openQtyEdit('${item.id}')" title="คลิกเพื่อตั้งค่าจำนวน" style="font-size:${isEmpty?38:46}px;font-weight:800;line-height:1;color:${qtyColor};cursor:pointer;padding:4px 6px;border-radius:10px;transition:background .15s" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background='transparent'">${item.qty}</div>
        <div style="font-size:10px;color:var(--text-faint);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">${qtyLabel}</div>
      </div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:11px;color:var(--text-faint);font-weight:500">ระดับสต็อก</span>
          <span class="mono" style="font-size:11px;color:var(--text-muted);font-weight:600">${p}%</span>
        </div>
        ${progressBar}${minMax}
      </div>
    </div>
    ${locLine}
    <div style="display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border2)">
      ${canEditSettings?`<button class="icon-btn" onclick="openSettings('${item.id}')" title="ตั้งค่า">${I.cog}</button>`:`<span style="width:34px;height:34px;display:inline-block"></span>`}

// ─── GROUPED CARDS ────────────────────────────────────────────
function renderGroupedCards(items,context){
  context=context||'inventory';
  if(!items.length)return`<div style="text-align:center;padding:60px;color:var(--text-faint)">
    <div style="font-size:36px;margin-bottom:12px">📦</div>
    <div style="font-size:14px;font-weight:500">ไม่พบรายการที่ตรงกับตัวกรอง</div>
  </div>`;
  const order=['Toshiba e-STUDIO 330AC (เครื่องเล็ก)','Toshiba e-STUDIO 2521AC (เครื่องใหญ่)'];
  const grouped={};
  items.forEach(i=>{if(!grouped[i.model])grouped[i.model]=[];grouped[i.model].push(i);});
  const modelColors={'330AC':'#0891b2','2521AC':'#7c3aed'};
  return order.filter(m=>grouped[m]).map(model=>{
    const mk=grouped[model][0].mk;
    const mc=modelColors[mk]||'#4f46e5';
    const mItems=grouped[model];
    const eModel=esc(model);
    const mSt=mItems.reduce((a,i)=>{const s=status(i);if(s==='OUT_OF_STOCK')a.out++;else if(s==='CRITICAL')a.crit++;else if(s==='LOW')a.low++;else a.ok++;return a;},{ok:0,low:0,crit:0,out:0});
    return`<div style="margin-bottom:28px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border2)">
        <div style="width:6px;height:24px;border-radius:99px;background:${mc};flex-shrink:0"></div>
        <div>
          <div style="font-size:16px;font-weight:700;color:var(--text-primary)">${eModel}</div>
          <div style="font-size:12px;color:var(--text-faint);margin-top:2px">
            ${mItems.length} รายการ
            ${mSt.out?` · <span style="color:var(--text-muted);font-weight:600">${mSt.out} หมดแล้ว</span>`:''}
            ${mSt.crit?` · <span style="color:#dc2626;font-weight:600">${mSt.crit} วิกฤต</span>`:''}
            ${mSt.low?` · <span style="color:#d97706;font-weight:600">${mSt.low} ใกล้หมด</span>`:''}
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:12px">
        ${mItems.map((item,idx)=>renderCard(item,idx,context)).join('')}
      </div>
    </div>`;
  }).join('');
}

// ─── FILTER BAR ───────────────────────────────────────────────
function renderFilters(items){
  const count=f=>f==='ALL'?items.length:items.filter(i=>status(i)===f).length;
  const tabs=[['ALL','ทั้งหมด'],['NORMAL','ปกติ'],['LOW','ใกล้หมด'],['CRITICAL','วิกฤต'],['OUT_OF_STOCK','หมดแล้ว']];
  return`<div style="display:flex;gap:6px;flex-wrap:wrap">
  ${tabs.map(([f,lb])=>{const active=S.filter===f;const cls=active?(f==='ALL'?'t-all':f==='NORMAL'?'t-normal':f==='LOW'?'t-low':f==='CRITICAL'?'t-critical':'t-empty'):'';
  return`<button class="tab ${cls}" onclick="setFilter('${f}')">${lb} <span style="font-size:11px;opacity:.65">(${count(f)})</span></button>`}).join('')}
  </div>`;
}

  document.getElementById('content').innerHTML=`

            <td><div style="display:flex;align-items:center;gap:6px">${tonerDot(r.color,8)}<span style="font-weight:600;color:var(--text-primary)">${esc(r.name)}</span></div></td>
            <td><span style="font-size:12px;padding:2px 8px;border-radius:6px;background:var(--surface3);color:var(--text-muted);font-weight:600">${esc(r.mk)}</span></td>

            <td class="mono" style="font-weight:800;font-size:15px;color:${delta>0?'#16a34a':delta<0?'#dc2626':'var(--text-muted)'}">${delta>0?'+':''}${delta}</td>
            <td class="mono" style="color:var(--text-faint)">${r.oq} → ${r.nq}</td>
            <td style="color:var(--text-secondary);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.reason||'—')}</td>
            <td style="color:var(--text-secondary);white-space:nowrap">${esc(r.user||'System')}</td>
          </tr>`;}).join('')}
        </tbody>
      </table>

    </div>
    ${totalPages>1?`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px">
      <span style="font-size:12px;color:var(--text-faint)">หน้า ${S.histPage} จาก ${totalPages} · ทั้งหมด ${S.history.length} รายการ</span>

        ${S.histPage>1?`<button class="tab" onclick="S.histPage--;renderContent()">← ก่อนหน้า</button>`:''}

      </div>
    </div>`:''}
  </div>`;
}

  const item=S.inventory.find(i=>i.id===S.settingsItem);if(!item)return;
  const tc=TC[item.color]||TC.BLACK;const st=status(item);
  const eName=esc(item.name);const eModel=esc(item.model||'');
  const eLoc=esc(item.loc||'');const eSup=esc(item.sup||'');const eRem=esc(item.remarks||'');
  _openModal(`
  <div class="modal-bg" onclick="if(event.target===this)closeSettings()" role="dialog" aria-modal="true" aria-label="ตั้งค่า ${eName}">
    <div class="card fade-up" style="width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden">
      <div style="height:4px;background:${tc.hex}"></div>
      <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border2)">
        <div style="width:36px;height:36px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid ${tc.hex}">
          ${tonerDot(item.color,14)}
        </div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700;color:var(--text-primary)">${eName}</div>
          <div style="font-size:11px;color:var(--text-faint);margin-top:1px">${eModel}</div>
        </div>
        ${badge(st)}
        <button onclick="closeSettings()" class="icon-btn">${I.x}</button>
      </div>
      <div style="padding:18px 20px;display:flex;flex-direction:column;gap:14px">
        <div class="card-sm" style="padding:14px">
          <div style="font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">เกณฑ์สต็อก</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
            ${[['crit','วิกฤต',item.critical,'#dc2626'],['min','ขั้นต่ำ',item.min,'#d97706'],['max','สูงสุด',item.max,'#16a34a']].map(([id,lb,v,c])=>`
            <div>
              <div style="font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:6px">${lb}</div>
              <input id="sf-${id}" type="number" min="0" value="${v}" style="font-size:16px;font-weight:700;text-align:center;color:${c}"/>
            </div>`).join('')}
          </div>
          <div style="font-size:11px;color:var(--text-faint);margin-top:10px;text-align:center;background:var(--surface2);padding:6px;border-radius:8px">วิกฤต &lt; ขั้นต่ำ &lt; สูงสุด</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${[['loc','📍 ตำแหน่งจัดเก็บ',eLoc,'เช่น Rack A-1'],['sup','🚚 ซัพพลายเออร์',eSup,'เช่น Toshiba Thailand'],['rem','📝 หมายเหตุ',eRem,'บันทึกเพิ่มเติม']].map(([id,lb,v,ph])=>`
          <div>
            <label for="sf-${id}" style="display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">${lb}</label>
            <input id="sf-${id}" type="text" value="${v}" placeholder="${ph}"/>
          </div>`).join('')}
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--border2);background:var(--surface2)">
        <button onclick="closeSettings()" style="padding:10px 20px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-size:14px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background='var(--surface)'">ยกเลิก</button>
        <button onclick="saveSettings()" style="padding:10px 22px;border-radius:10px;background:#4f46e5;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;box-shadow:0 2px 8px rgba(79,70,229,.3)" onmouseover="this.style.background='#4338ca'" onmouseout="this.style.background='#4f46e5'">บันทึก</button>
      </div>
    </div>
  </div>`);
}

// ─── NOTIFICATIONS ────────────────────────────────────────────
function renderNotifPanel(){
  const uc=unread();
  document.getElementById('notif-root').innerHTML=`
  <div class="notif-overlay" onclick="toggleNotif()"></div>
  <div class="notif-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border2)">
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--text-primary)">การแจ้งเตือน</div>
        ${uc?`<div style="font-size:12px;color:var(--text-faint);margin-top:2px">${uc} ยังไม่ได้อ่าน</div>`:''}
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${uc?`<button onclick="markAllRead()" style="display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;background:var(--surface3);border:1px solid var(--border);color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif" onmouseover="this.style.background='#ede9fe';this.style.color='#4f46e5'" onmouseout="this.style.background='var(--surface3)';this.style.color='var(--text-muted)'">${I.check} อ่านทั้งหมด</button>`:''}
        <button class="icon-btn" onclick="toggleNotif()">${I.x}</button>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:10px">${renderNotifList()}</div>
  </div>`;
}
function renderNotifList(){
  const notifs=[...S.notifications].sort((a,b)=>({CRITICAL:0,WARNING:1,INFO:2}[a.type]-{CRITICAL:0,WARNING:1,INFO:2}[b.type]));
  if(!notifs.length)return`<div style="text-align:center;padding:60px 20px;color:var(--text-faint);font-size:14px">ไม่มีการแจ้งเตือน</div>`;
  return notifs.map(n=>{const nc=NIC[n.type];return`
  <div style="display:flex;gap:10px;padding:11px 12px;border-radius:10px;margin-bottom:5px;background:${n.read?'transparent':nc.bg};border:1px solid ${n.read?'transparent':nc.border};opacity:${n.read ? .55 : 1};transition:background .15s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='${n.read?'transparent':nc.bg}'">
    <span style="color:${nc.c};flex-shrink:0;margin-top:2px">${I[nc.icon]}</span>
    <div style="min-width:0">
      ${!n.read?`<span style="width:7px;height:7px;border-radius:50%;background:${nc.c};display:inline-block;margin-right:4px;vertical-align:middle"></span>`:''}
      <span style="font-size:13px;font-weight:600;color:var(--text-primary)">${esc(n.title)}</span>
      <div style="font-size:12px;color:var(--text-muted);margin-top:3px;line-height:1.5">${esc(n.msg)}</div>
      <div style="font-size:11px;color:var(--text-faint);margin-top:5px">${ago(n.date)}</div>
    </div>
  </div>`}).join('');
}

// ─── MAIN ─────────────────────────────────────────────────────
function renderContent(){
  if(!S.user)return;
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    el.classList.toggle('active',el.getAttribute('onclick')===`nav('${S.page}')`);
  });
  if(S.page==='dashboard')renderDashboard();
  else if(S.page==='inventory')renderInventory();
  else if(S.page==='history')renderHistory();
  else if(S.page==='settings')renderSettings();
  else if(S.page==='users')renderUsers();
}
function render(){if(!S.user){renderLogin();return;}renderShell();renderContent();}
document.addEventListener('compositionstart',function(e){
  if(e.target&&e.target.id==='search-input'){searchComposing=true;clearTimeout(searchTimer);}
});
document.addEventListener('compositionend',function(e){
  if(e.target&&e.target.id==='search-input'){searchComposing=false;setSearch(e.target.value);}
});
document.addEventListener('keydown',function(e){
  if(e.key!=='Escape')return;
  if(document.getElementById('modal-root')?.innerHTML)closeModal();
  else if(S.notifOpen)toggleNotif();
});
initApp();
</script>
</body>
</html>
