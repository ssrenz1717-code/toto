<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Call Tracking Widget — Demo</title>
<link rel="stylesheet" href="./widget.css" />
</head>
<body style="font-family:sans-serif;padding:40px;background:#f0f4f8">
  <div id="toshiba-call-widget"></div>

  <script type="module">
    import { initCallTrackingWidget } from './widget.js';

    initCallTrackingWidget(document.getElementById('toshiba-call-widget'), {
      apiBaseUrl: 'http://localhost:3001/api',
      actionType: 'CALL_TOSHIBA',
      phoneNumber: '096-786-1717',
      displayName: 'Toshiba Service Center',
      getUserName: () => 'Demo User', // in index.html this becomes: () => S.user?.fullName
    });
  </script>
</body>
</html>
